<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>水豚君練習本</title>
    <style>
        body { background-color: #FEF8F0; text-align: center; font-family: sans-serif; margin: 0; padding: 20px; }
        .title { color: #5D4037; font-size: 24px; margin-bottom: 15px; }
        .ui-panel { margin-bottom: 15px; display: flex; justify-content: center; gap: 10px; }
        
        #box { 
            width: 480px; height: 360px; background: white; border: 8px solid #E6D5C3; 
            border-radius: 30px; margin: 0 auto; position: relative; overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        canvas { position: absolute; top: 0; left: 0; z-index: 10; cursor: crosshair; }
        
        /* 浮水印與輔助線層 */
        .guide-layer { position: absolute; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .bg-text { font-size: 240px; font-weight: bold; color: #F0F0F0; line-height: 360px; }
        
        button { padding: 10px 20px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; }
        .btn-score { background: #FFAB91; color: white; }
        .btn-reset { background: #E6D5C3; color: #5D4037; }

        /* 評分彈窗 */
        #result-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); z-index: 100; display: none;
            flex-direction: column; justify-content: center; align-items: center;
        }
        #grade { font-size: 100px; color: #FF7043; font-weight: 900; margin: 0; }
    </style>
</head>
<body>

    <div class="title">🐾 水豚君陪你寫英文 🐾</div>

    <div class="ui-panel">
        <select id="letterSelect"></select>
        <button class="btn-reset" id="resetBtn">重寫</button>
        <button class="btn-score" id="scoreBtn">看評分</button>
    </div>

    <div id="box">
        <div class="guide-layer">
            <div id="watermarkText" class="bg-text">Aa</div>
        </div>
        <canvas id="paintCanvas" width="480" height="360"></canvas>
        
        <div id="result-overlay">
            <h1 id="grade">A+</h1>
            <p id="feedbackText">寫得太棒了！</p>
            <button onclick="document.getElementById('result-overlay').style.display='none'">繼續練習</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const canvas = document.getElementById('paintCanvas');
            const ctx = canvas.getContext('2d');
            const select = document.getElementById('letterSelect');
            const watermark = document.getElementById('watermarkText');
            const overlay = document.getElementById('result-overlay');
            let drawing = false;

            // 初始化選單
            for(let i=65; i<=90; i++) {
                let L = String.fromCharCode(i);
                let opt = document.createElement('option');
                opt.value = L;
                opt.textContent = `練習 ${L}${L.toLowerCase()}`;
                select.appendChild(opt);
            }

            function initCanvas() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                watermark.textContent = select.value + select.value.toLowerCase();
                overlay.style.display = 'none';
            }

            // 繪圖邏輯
            function startDraw(e) {
                drawing = true;
                ctx.beginPath();
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - rect.left;
                const y = (e.clientY || e.touches[0].clientY) - rect.top;
                ctx.moveTo(x, y);
            }

            function drawingMove(e) {
                if (!drawing) return;
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - rect.left;
                const y = (e.clientY || e.touches[0].clientY) - rect.top;
                ctx.lineWidth = 15;
                ctx.lineCap = 'round';
                ctx.strokeStyle = '#4FC3F7';
                ctx.lineTo(x, y);
                ctx.stroke();
            }

            function stopDraw() { drawing = false; }

            // 評分邏輯
            function calculateScore() {
                // 簡單演示邏輯：檢查是否有畫畫
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                let hasPixels = false;
                for (let i = 3; i < imgData.data.length; i += 4) {
                    if (imgData.data[i] > 0) { hasPixels = true; break; }
                }
                
                document.getElementById('grade').textContent = hasPixels ? "A+" : "加油";
                document.getElementById('feedbackText').textContent = hasPixels ? "水豚君為你歡呼！" : "試著寫寫看吧！";
                overlay.style.display = 'flex';
            }

            // 綁定事件
            canvas.addEventListener('mousedown', startDraw);
            canvas.addEventListener('mousemove', drawingMove);
            window.addEventListener('mouseup', stopDraw);
            canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(e); });
            canvas.addEventListener('touchmove', (e) => { e.preventDefault(); drawingMove(e); });
            canvas.addEventListener('touchend', stopDraw);

            document.getElementById('resetBtn').onclick = initCanvas;
            document.getElementById('scoreBtn').onclick = calculateScore;
            select.onchange = initCanvas;

            initCanvas();
        });
    </script>
</body>
</html>
