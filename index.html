<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>水豚君英文練習 Aa-Zz</title>
    <style>
        :root { --capy-brown: #9E7E6B; --capy-dark: #5D4037; --bg-color: #FDF5E6; }
        body { background: var(--bg-color); text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; color: var(--capy-dark); overflow: hidden; }
        
        #box { 
            width: 480px; height: 360px; background: white; 
            border: 8px solid #E6D5C3; border-radius: 30px; 
            margin: 10px auto; position: relative; touch-action: none;
            box-shadow: 0 8px 25px rgba(158, 126, 107, 0.2);
        }

        canvas { display: block; border-radius: 22px; position: relative; z-index: 5; background: transparent; }

        /* 水豚浮水印背景 */
        #capy-bg { position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%); width: 250px; opacity: 0.08; z-index: 1; pointer-events: none; }

        .ui { margin-bottom: 15px; display: flex; justify-content: center; gap: 12px; }
        select, button { padding: 12px 20px; font-size: 16px; border-radius: 25px; border: 2px solid #D7CCC8; cursor: pointer; transition: 0.2s; }
        .score-btn { background: #FFAB91; color: white; border: none; font-weight: bold; }
        .score-btn:hover { background: #FF8A65; }

        /* 🎉 真正的水豚歡呼動畫 */
        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; background: rgba(255, 255, 255, 0.95); 
            border-radius: 22px; flex-direction: column; justify-content: center; align-items: center; z-index: 100; 
        }
        .capy-animation { width: 180px; animation: capy-jump 0.6s infinite alternate cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #grade { font-size: 90px; font-weight: 900; color: #FF7043; margin: -10px 0; text-shadow: 2px 2px 0 #FFF, 4px 4px 0 #FFAB91; }
        
        @keyframes capy-jump { from { transform: translateY(0) scale(1); } to { transform: translateY(-30px) scale(1.05); } }
        @media (max-width: 500px) { #box { width: 95vw; height: 71vw; } }
    </style>
</head>
<body>
    <h2 style="font-size: 24px; letter-spacing: 2px;">🐾 水豚君陪你寫英文 🐾</h2>
    <div class="ui">
        <select id="sel"></select>
        <button id="resetBtn" style="background: #FFF;">重寫</button>
        <button class="score-btn" id="scoreBtn">看評分</button>
    </div>
    <div id="box">
        <svg id="capy-bg" viewBox="0 0 200 150">
            <ellipse cx="100" cy="85" rx="70" ry="50" fill="#9E7E6B" /> <path d="M140,40 Q175,40 175,80 L175,100 Q170,120 140,120 Z" fill="#9E7E6B" /> <circle cx="155" cy="70" r="4" fill="#3E2723" /> <path d="M170,95 Q175,95 175,100" stroke="#3E2723" fill="none" stroke-width="2" /> <ellipse cx="130" cy="45" rx="8" ry="12" fill="#D7CCC8" opacity="0.4" /> </svg>

        <canvas id="c" width="480" height="360"></canvas>

        <div id="overlay">
            <svg class="capy-animation" viewBox="0 0 200 200">
                <circle cx="100" cy="40" r="12" fill="#FFA726" /> <rect x="98" y="25" width="4" height="6" fill="#4CAF50" /> <ellipse cx="100" cy="110" rx="70" ry="50" fill="#8D6E63" /> <path d="M140,65 Q175,65 175,105 L175,125 Q170,145 140,145 Z" fill="#8D6E63" /> <line x1="150" y1="90" x2="165" y2="90" stroke="white" stroke-width="3" stroke-linecap="round" /> <text x="30" y="80" font-size="40">✨</text>
                <text x="140" y="50" font-size="40">✨</text>
            </svg>
            <div id="grade">A+</div>
            <p style="font-weight: bold; color: #8D6E63;">水豚君：寫得太棒了！</p>
        </div>
    </div>

    <script>
        const cvs = document.getElementById('c'), ctx = cvs.getContext('2d');
        const sel = document.getElementById('sel'), overlay = document.getElementById('overlay');
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        let drawing = false;

        alphabet.forEach(l => {
            let opt = document.createElement('option');
            opt.value = l; opt.innerText = `練習 ${l}${l.toLowerCase()}`;
            sel.appendChild(opt);
        });

        function init() {
            overlay.style.display = 'none';
            ctx.clearRect(0, 0, 480, 360);
            ctx.setLineDash([8, 8]); ctx.lineWidth = 2; ctx.strokeStyle = "#E0E0E0";
            [90, 144, 198, 252].forEach(y => { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(480,y); ctx.stroke(); });
            ctx.setLineDash([]);
            ctx.font = 'bold 230px Arial'; ctx.fillStyle = '#F5F5F5'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(sel.value + sel.value.toLowerCase(), 240, 180);
        }

        const getPos = e => {
            const r = cvs.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - r.left, y: clientY - r.top };
        };
