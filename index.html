<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>懶懶水豚君英文練習</title>
    <style>
        :root {
            --capy-body: #D7A98C;
            --capy-nose: #A67C5F;
            --capy-line: #5D4037;
            --bg-color: #FEF8F0;
        }

        body { 
            background: var(--bg-color); 
            text-align: center; 
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; 
            margin: 0; padding: 15px; 
            color: var(--capy-line);
            overflow: hidden; 
        }

        #box { 
            width: 480px; height: 360px; 
            background: white; 
            border: 8px solid #E6D5C3; 
            border-radius: 35px; 
            margin: 10px auto; 
            position: relative; 
            box-shadow: 0 8px 25px rgba(166, 124, 95, 0.2); 
            touch-action: none; 
        }

        /* 調整畫布層級，確保它在最前面 */
        canvas { 
            display: block; 
            border-radius: 27px; 
            background: transparent; 
            position: absolute; top: 0; left: 0;
            z-index: 10; 
        }

        /* 底圖浮水印：移到 z-index 1 */
        #capy-watermark {
            position: absolute;
            top: 55%; left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            opacity: 0.1; /* 稍微調淡，不干擾寫字 */
            z-index: 1;
            pointer-events: none;
        }

        .ui { margin-bottom: 15px; display: flex; justify-content: center; gap: 15px; align-items: center; }
        select, button { padding: 12px 22px; font-size: 17px; border-radius: 25px; border: 2px solid #D7CCC8; cursor: pointer; }
        .score-btn { background: var(--capy-nose); color: white; border: none; font-weight: bold; }
        .reset-btn { background: #E6D5C3; color: var(--capy-line); border: none; font-weight: bold; }

        #celebration-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; background: rgba(255, 255, 255, 0.96); 
            border-radius: 27px; flex-direction: column; justify-content: center; align-items: center; z-index: 100; 
        }
        .capy-jump { width: 160px; height: 160px; animation: capyHappy 0.6s infinite alternate cubic-bezier(0.175, 0.885, 0.32, 1.275); }
