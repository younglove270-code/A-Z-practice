<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>水豚君的英文練習帖</title>
    <style>
        body {
            margin: 0;
            padding: 15px 10px 30px;
            background: #FFF9F0;
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            text-align: center;
            color: #5D4037;
            background-image: 
                radial-gradient(circle, #E6D5C3 1px, transparent 1px);
            background-size: 30px 30px;
        }
        h1 {
            font-size: 26px;
            margin: 10px 0 20px;
            color: #5D4037;
        }
        .controls {
            background: white;
            padding: 12px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        select, button {
            padding: 10px 18px;
            font-size: 16px;
            border-radius: 9999px;
            border: none;
            cursor: pointer;
        }
        select {
            background: #F8F1E9;
            border: 2px solid #E6D5C3;
        }
        .reset-btn {
            background: #E6D5C3;
            color: #5D4037;
            font-weight: 600;
        }
        .score-btn {
            background: #FF9F80;
            color: white;
            font-weight: 700;
        }

        #box {
            width: 480px;
            max-width: 95vw;
            height: 360px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            box-shadow: 0 10px 30px rgba(166,124,95,0.18);
            position: relative;
            overflow: hidden;
        }
        canvas {
            display: block;
            border-radius: 32px;
        }

        /* 小水豚裝飾 */
        .corner-capy {
            position: absolute;
            bottom: 20px;
            right: 25px;
            width: 70px;
            height: 50px;
            opacity: 0.85;
            z-index: 10;
        }

        /* 評分遮罩 */
        #overlay {
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0.96);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            border-radius: 32px;
        }
        .capy-stickers {
            display: flex;
            gap: 30px;
            margin-bottom: 15px;
        }
        .capy-sticker {
            width: 120px;
            height: 120px;
        }
        .happy { animation: jump 0.8s infinite alternate ease-in-out; }
        #grade {
            font-size: 110px;
            font-weight: 900;
            margin: 10px 0 8px;
            line-height: 1;
        }
        #feedback {
            font-size: 23px;
            font-weight: bold;
        }

        @keyframes jump {
            from { transform: translateY(0) rotate(-8deg); }
            to { transform: translateY(-35px) rotate(8deg); }
        }
    </style>
</head>
<body>
    <h1>🌟 水豚君的英文練習帖 🌟</h1>
    
    <div class="controls">
        <select id="sel"></select>
        <button class="reset-btn" id="resetBtn">擦乾淨</button>
        <button class="score-btn" id="scoreBtn">交卷評分</button>
    </div>

    <div id="box">
        <canvas id="c" width="480" height="360"></canvas>
        
        <!-- 角落小水豚裝飾 -->
        <svg class="corner-capy" viewBox="0 0 100 70" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="55" cy="45" rx="38" ry="25" fill="#D7A98C" stroke="#5D4037" stroke-width="3"/>
            <ellipse cx="78" cy="48" rx="14" ry="18" fill="#A67C5F" stroke="#5D4037" stroke-width="3"/>
            <circle cx="68" cy="38" r="4" fill="#5D4037"/>
            <circle cx="48" cy="38" r="4" fill="#5D4037"/>
        </svg>

        <!-- 評分結果遮罩 -->
        <div id="overlay">
            <div class="capy-stickers" id="stickers"></div>
            <div id="grade">A+</div>
            <div id="feedback">太厲害了！水豚君為你歡呼～</div>
            <p style="margin-top:25px; color:#999; font-size:15px;">點擊任意處繼續下一題</p>
        </div>
    </div>

    <script>
        const cvs = document.getElementById('c');
        const ctx = cvs.getContext('2d');
        const sel = document.getElementById('sel');
        const overlay = document.getElementById('overlay');
        const gradeEl = document.getElementById('grade');
        const feedbackEl = document.getElementById('feedback');
        const stickersEl = document.getElementById('stickers');

        let drawing = false;
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

        alphabet.forEach(l => {
            const opt = document.createElement('option');
            opt.value = l;
            opt.textContent = `字母 ${l}${l.toLowerCase()}`;
            sel.appendChild(opt);
        });

        function reset() {
            overlay.style.display = 'none';
            ctx.clearRect(0, 0, 480, 360);

            // 四線格
            ctx.setLineDash([8, 8]);
            ctx.lineWidth = 1.5;
            [90, 144, 198, 252].forEach((y, i) => {
                ctx.strokeStyle = (i === 2) ? "#A3E635" : "#E6D5C3";
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(480, y); ctx.stroke();
            });
            ctx.setLineDash([]);

            // 底字
            ctx.font = 'bold 240px Arial';
            ctx.fillStyle = '#F0E8E0';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(sel.value + sel.value.toLowerCase(), 240, 180);
        }

        function getPos(e) {
            const r = cvs.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - r.left;
            const y = (e.clientY || e.touches[0].clientY) - r.top;
            return { x, y };
        }

        function start(e) { drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); }
        function move(e) {
            if (!drawing) return;
            const p = getPos(e);
            ctx.lineWidth = 18;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = '#4A9FFF';
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
            ctx.beginPath(); ctx.moveTo(p.x, p.y);
        }
        function stop() { drawing = false; }

        // 建立水豚 SVG
        function createCapy(happy = true) {
            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.classList.add('capy-sticker');
            if (happy) svg.classList.add('happy');
            svg.setAttribute("viewBox", "0 0 130 130");
            svg.innerHTML = happy ? `
                <ellipse cx="65" cy="75" rx="52" ry="42" fill="#D7A98C" stroke="#5D4037" stroke-width="5"/>
                <ellipse cx="95" cy="80" rx="23" ry="28" fill="#A67C5F" stroke="#5D4037" stroke-width="4"/>
                <ellipse cx="35" cy="72" rx="20" ry="25" fill="#A67C5F" stroke="#5D4037" stroke-width="4"/>
                <rect x="42" y="52" width="22" height="5" rx="2.5" fill="#5D4037" transform="rotate(-25 48 54)"/>
                <text x="88" y="42" font-size="32">✨</text>
            ` : `
                <ellipse cx="65" cy="75" rx="52" ry="42" fill="#D7A98C" stroke="#5D4037" stroke-width="5"/>
                <ellipse cx="95" cy="80" rx="23" ry="28" fill="#A67C5F" stroke="#5D4037" stroke-width="4"/>
                <ellipse cx="35" cy="72" rx="20" ry="25" fill="#A67C5F" stroke="#5D4037" stroke-width="4"/>
                <rect x="42" y="52" width="22" height="5" rx="2.5" fill="#5D4037" transform="rotate(-45 48 54)"/>
                <text x="82" y="48" font-size="38">😢</text>
            `;
            return svg;
        }

        function showResult(rank) {
            stickersEl.innerHTML = '';
            gradeEl.textContent = rank;

            if (rank === "A+" || rank === "A") {
                stickersEl.append(createCapy(true));
                stickersEl.append(createCapy(true));
                feedbackEl.textContent = "太厲害了！水豚君為你歡呼～ 🥳";
                feedbackEl.style.color = "#FF7043";
            } else if (rank === "B+" || rank === "B") {
                stickersEl.append(createCapy(true));
                feedbackEl.textContent = "很棒喔！繼續加油～ 💪";
                feedbackEl.style.color = "#FFB300";
            } else {
                stickersEl.append(createCapy(false));
                feedbackEl.textContent = "沒關係…下次再努力喔～ 😢";
                feedbackEl.style.color = "#78909C";
            }

            overlay.style.display = 'flex';
        }

        function score() {
            const w = 480, h = 360;
            const temp = document.createElement('canvas');
            temp.width = w; temp.height = h;
            const tctx = temp.getContext('2d');

            tctx.font = 'bold 240px Arial';
            tctx.textAlign = 'center';
            tctx.textBaseline = 'middle';
            tctx.fillText(sel.value + sel.value.toLowerCase(), 240, 180);

            const std = tctx.getImageData(0,0,w,h).data;
            const cur = ctx.getImageData(0,0,w,h).data;

            let match = 0, total = 0, miss = 0;
            for (let i = 3; i < std.length; i += 4) {
                if (std[i] > 50) {
                    total++;
                    if (cur[i] > 180) match++;
                } else if (cur[i] > 180) miss++;
            }

            const final = total > 0 ? (match / total) * 100 - miss * 1.8 : 0;
            let rank = final > 88 ? "A+" :
                       final > 75 ? "A" :
                       final > 55 ? "B+" :
                       final > 35 ? "B" : "C+";

            showResult(rank);
        }

        // 點擊遮罩任意處關閉並下一題
        overlay.addEventListener('click', () => {
            if (sel.selectedIndex < sel.options.length - 1) {
                sel.selectedIndex++;
                reset();
            } else {
                alert("🎉 恭喜完成所有字母練習！");
                reset();
            }
        });

        // 事件綁定
        cvs.addEventListener('mousedown', start);
        cvs.addEventListener('mousemove', move);
        window.addEventListener('mouseup', stop);
        cvs.addEventListener('touchstart', e => {e.preventDefault(); start(e);});
        cvs.addEventListener('touchmove', e => {e.preventDefault(); move(e);});
        cvs.addEventListener('touchend', stop);

        document.getElementById('resetBtn').onclick = reset;
        document.getElementById('scoreBtn').onclick = score;
        sel.onchange = reset;

        reset(); // 啟動
    </script>
</body>
</html>
