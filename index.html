<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Young大小寫練習板</title>
    <style>
        body { background: #FDFCEF; text-align: center; font-family: sans-serif; margin: 0; padding: 20px; }
        #box { width: 450px; height: 340px; background: white; border: 5px solid #FFDE59; border-radius: 20px; margin: 10px auto; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.1); touch-action: none; }
        canvas { display: block; border-radius: 15px; background: #fff; cursor: crosshair; }
        .ui { margin-bottom: 10px; display: flex; justify-content: center; gap: 10px; align-items: center; }
        select, button { padding: 12px 15px; font-size: 16px; border-radius: 10px; border: 1px solid #ccc; cursor: pointer; }
        .score-btn { background: #84CC16; color: white; border: none; font-weight: bold; }
        .reset-btn { background: #FF7F50; color: white; border: none; font-weight: bold; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; background: rgba(255,255,255,0.9); border-radius: 15px; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        #grade { font-size: 90px; font-weight: bold; color: #FF4757; margin: 0; text-shadow: 2px 2px 0px #eee; }
    </style>
</head>
<body>

    <h2 style="color: #555;">✨ 大小寫同步挑戰 ✨</h2>
    
    <div class="ui">
        <select id="sel"></select>
        <button class="reset-btn" id="resetBtn">重寫</button>
        <button class="score-btn" id="scoreBtn">交卷評分</button>
    </div>

    <div id="box">
        <canvas id="c" width="450" height="340"></canvas>
        <div id="overlay">
            <div id="grade">A+</div>
            <p id="feedback" style="color: #555; font-weight: bold;">太棒了！準備下一題...</p>
        </div>
    </div>

    <script>
        (function() {
            var cvs = document.getElementById('c');
            var ctx = cvs.getContext('2d');
            var sel = document.getElementById('sel');
            var overlay = document.getElementById('overlay');
            var drawing = false;
            var alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

            // 初始化選單 (Aa, Bb, Cc...)
            alphabet.forEach(function(l) {
                var opt = document.createElement('option');
                opt.value = l;
                opt.innerHTML = "練習 " + l + l.toLowerCase();
                sel.appendChild(opt);
            });

            function reset() {
                overlay.style.display = 'none';
                ctx.clearRect(0, 0, 450, 340);
                // 畫四線格
                ctx.setLineDash([5, 5]); ctx.lineWidth = 1;
                [85, 136, 187, 238].forEach(function(y, i) {
                    ctx.strokeStyle = (i === 2) ? "#A3E635" : "#FFCFCF";
                    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(450, y); ctx.stroke();
                });
                ctx.setLineDash([]);
                // 畫底字：大寫 + 小寫 (例如 Aa)
                ctx.font = 'bold 220px Arial'; ctx.fillStyle = '#F2F2F2'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                var text = sel.value + sel.value.toLowerCase();
                ctx.fillText(text, 225, 180);
            }

            function getPos(e) {
                var r = cvs.getBoundingClientRect();
                var clientX = e.clientX || (e.touches && e.touches[0].clientX);
                var clientY = e.clientY || (e.touches && e.touches[0].clientY);
                return { x: clientX - r.left, y: clientY - r.top };
            }

            function start(e) { drawing = true; ctx.beginPath(); var p = getPos(e); ctx.moveTo(p.x, p.y); }
            function move(e) {
                if (!drawing) return;
                var p = getPos(e);
                ctx.lineWidth = 14; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.strokeStyle = '#45AAF2';
                ctx.lineTo(p.x, p.y); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(p.x, p.y);
            }
            function stop() { drawing = false; }

            // 🌟 強化評分邏輯
            function score() {
                var w = 450, h = 340;
                var tCvs = document.createElement('canvas');
                tCvs.width = w; tCvs.height = h;
                var tCtx = tCvs.getContext('2d');
                tCtx.font = 'bold 220px Arial'; tCtx.textAlign = 'center'; tCtx.textBaseline = 'middle';
                tCtx.fillText(sel.value + sel.value.toLowerCase(), 225, 180);
                
                var standard = tCtx.getImageData(0,0,w,h).data;
                var current = ctx.getImageData(0,0,w,h).data;
                
                var match = 0, total = 0, miss = 0;

                for(var i=3; i<standard.length; i+=4) {
                    var inStandard = standard[i] > 50;
                    var inDrawn = current[i-1] > 180; // 檢查藍色通道

                    if(inStandard) {
                        total++;
                        if(inDrawn) match++; // 正確塗在字體內
                    } else if(inDrawn) {
                        miss++; // 畫出界
                    }
                }

                // 計算精準度
                var coverage = (match / total) * 100;
                var errorRate = (miss / total) * 100;
                
                // 嚴格公式：得分 = 覆蓋率 - (出界率 * 1.5)
                var finalScore = coverage - (errorRate * 1.5);

                var rank = "C+";
                var feedback = "加油！再試一次";
                
                if(finalScore > 88) { rank = "A+"; feedback = "神筆手！太完美了"; }
                else if(finalScore > 75) { rank = "A"; feedback = "很棒！寫得很準喔"; }
                else if(finalScore > 55) { rank = "B+"; feedback = "不錯！注意不要出界"; }
                else if(finalScore > 35) { rank = "B"; feedback = "多練習幾次會更好"; }

                document.getElementById('grade').innerHTML = rank;
                document.getElementById('feedback').innerHTML = feedback;
                overlay.style.display = 'flex';

                // 自動跳轉
                setTimeout(function() {
                    if (sel.selectedIndex < sel.options.length - 1) {
                        sel.selectedIndex++;
                        reset();
                    } else {
                        document.getElementById('grade').innerHTML = "🏆";
                        document.getElementById('feedback').innerHTML = "完成所有練習！";
                    }
                }, 1800);
            }

            cvs.addEventListener('mousedown', start); cvs.addEventListener('mousemove', move); window.addEventListener('mouseup', stop);
            cvs.addEventListener('touchstart', function(e){ e.preventDefault(); start(e); });
            cvs.addEventListener('touchmove', function(e){ e.preventDefault(); move(e); });
            cvs.addEventListener('touchend', stop);
            
            document.getElementById('resetBtn').onclick = reset;
            document.getElementById('scoreBtn').onclick = score;
            sel.onchange = reset;

            reset();
        })();
    </script>
</body>
</html>
