<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>水豚君森林教室</title>
    <style>
        body { background-color: #F1F8E9; text-align: center; font-family: sans-serif; margin: 0; padding: 20px; color: #5D4037; }
        .ui-box { margin-bottom: 15px; display: flex; justify-content: center; gap: 10px; align-items: center; }
        .notebook {
            position: relative; width: 600px; height: 450px; background: white; 
            border: 12px solid #A1887F; border-radius: 40px; margin: 0 auto; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); touch-action: none; overflow: hidden;
        }
        canvas { position: absolute; top: 0; left: 0; z-index: 10; cursor: crosshair; }
        
        /* 🌟 這是內建的水豚圖片，絕對不會顯示失敗 */
        .capy-img {
            position: absolute; bottom: 15px; right: 20px; width: 150px; z-index: 5;
            content: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMjAgODAiPjxlbGxpcHNlIGN4PSI2MCIgY3k9IjUwIiByeD0iNTAiIHJ5PSIzMCIgZmlsbD0iI0Q3QTk4QyIgc3Ryb2tlPSIjQTFODzdGIiBzdHJva2Utd2lkdGg9IjIiLz48ZWxsaXBzZSBjeD0iMTAwIiBjeT0iNjAiIHJ4PSIxNSIgcnk9IjE4IiBmaWxsPSIjQjA4OTY4Ii8+PGNpcmNsZSBjeD0iMTAyIiBjeT0iNTIiIHI9IjIuNSIgZmlsbD0iIzMzMyIvPjxjaXJjbGUgY3g9IjYwIiBjeT0iMTgiIHI9IjgiIGZpbGw9IiNGRkE3MjYiLz48cGF0aCBkPSJNNjAsMTBMNjAsMTQiIHN0cm9rZT0iZ3JlZW4iIHN0cm9rZS13aWR0aPSIyIi8+PHBhdGggZD0iTTM1LDQ1UTQ1LDQyLDU1LDQ1IiBzdHJva2U9IiM1RDQwMzciIHN0cm9rZS13aWR0aPSIyIiBmaWxsPSJub25lIi8+PC9zdmc+');
        }

        button, select { padding: 12px 20px; font-size: 18px; border-radius: 25px; border: 2px solid #A1887F; background: white; font-weight: bold; cursor: pointer; }
        .btn-score { background: #FF8A65; color: white; border: none; box-shadow: 0 4px #D84315; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 100; display: none; flex-direction: column; justify-content: center; align-items: center; }
        #gradeText { font-size: 120px; color: #FF5722; margin: 0; font-weight: 900; }
    </style>
</head>
<body>

    <h2 style="font-size: 28px;">🌿 水豚君森林教室 Aa-Zz 🍊</h2>

    <div class="ui-box">
        <select id="letterSelect"></select>
        <button onclick="playLetterSound()">🔊 聽發音</button>
        <button onclick="resetCanvas()">擦乾淨</button>
        <button class="btn-score" onclick="submitWork()">寫好了！</button>
    </div>

    <div class="notebook">
        <div class="capy-img"></div>
        <canvas id="paintCanvas" width="600" height="450"></canvas>
        <div id="overlay">
            <h1 id="gradeText">A+</h1>
            <p style="font-size: 20px; font-weight: bold;">水豚君：寫得太棒了！</p>
        </div>
    </div>

    <script>
        let canvas, ctx, sel, overlay, gradeText;
        let isDrawing = false;
        let hasPainted = false;

        window.onload = function() {
            canvas = document.getElementById('paintCanvas');
            ctx = canvas.getContext('2d');
            sel = document.getElementById('letterSelect');
            overlay = document.getElementById('overlay');
            gradeText = document.getElementById('gradeText');

            // 初始化 A-Z 選單
            for(let i=65; i<=90; i++) {
                let char = String.fromCharCode(i);
                let opt = document.createElement('option');
                opt.value = char;
                opt.innerHTML = `練習字母 ${char} ${char.toLowerCase()}`;
                sel.appendChild(opt);
            }

            // 繪圖邏輯
            const getPos = (e) => {
                const r = canvas.getBoundingClientRect();
                const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
                const y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
                return {x, y};
            };

            const start = (e) => { isDrawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); };
            const move = (e) => { 
                if(!isDrawing) return; e.preventDefault();
                const p = getPos(e); ctx.lineTo(p.x, p.y);
                ctx.lineWidth = 15; ctx.lineCap = 'round'; ctx.strokeStyle = '#5D4037';
                ctx.stroke(); hasPainted = true;
            };
            const stop = () => { isDrawing = false; };

            canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move); window.addEventListener('mouseup', stop);
            canvas.addEventListener('touchstart', start); canvas.addEventListener('touchmove', move); canvas.addEventListener('touchend', stop);

            sel.onchange = resetCanvas;
            resetCanvas();
        };

        function playLetterSound() {
            const utter = new SpeechSynthesisUtterance(sel.value);
            utter.lang = 'en-US'; utter.rate = 0.7;
            window.speechSynthesis.speak(utter);
        }

        function resetCanvas() {
            overlay.style.display = 'none';
            hasPainted = false;
            ctx.clearRect(0, 0, 600, 450);
            
            // 繪製灰色範本
            ctx.font = 'bold 280px Arial';
            ctx.fillStyle = '#F0F0F0';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(sel.value + sel.value.toLowerCase(), 300, 225);
        }

        function submitWork() {
            overlay.style.display = 'flex';
            if (!hasPainted) {
                gradeText.innerText = "再加油";
                gradeText.style.color = "#9E9E9E";
            } else {
                gradeText.innerText = "A+";
                gradeText.style.color = "#FF5722";
                setTimeout(() => {
                    if (sel.selectedIndex < 25) {
                        sel.selectedIndex++;
                        resetCanvas();
                    }
                }, 2000);
            }
        }
    </script>
</body>
</html>
