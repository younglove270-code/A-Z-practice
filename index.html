<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>水豚君可愛練習本</title>
    <style>
        /* 全局森林風格背景 */
        body { 
            background: #E8F5E9; /* 森林淺綠 */
            background-image: url('https://www.transparenttextures.com/patterns/little-knitted.png');
            margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px;
            font-family: "Microsoft JhengHei", sans-serif;
        }

        /* 標題裝飾 */
        .title-container {
            background: #FFF9C4; padding: 10px 40px; border-radius: 50px;
            border: 4px solid #FBC02D; margin-bottom: 20px; box-shadow: 0 4px 0 #F9A825;
        }
        .title { color: #5D4037; font-size: 26px; font-weight: bold; margin: 0; }

        /* 練習本主體 */
        #notebook { 
            position: relative; width: 550px; height: 420px;
            background: white; border: 15px solid #A1887F; border-radius: 40px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15); overflow: hidden;
        }

        /* 內容區背景：Q版小朋友學英文插畫 (用穩定連結) */
        .decoration-bg {
            position: absolute; width: 100%; height: 100%;
            background-image: url('https://img.freepik.com/free-vector/hand-drawn-child-learning-concept_23-2148780519.jpg?size=626&ext=jpg');
            background-size: cover; background-position: center;
            opacity: 0.15; z-index: 0; pointer-events: none;
        }

        /* 字母導引字 */
        .letter-guide { 
            position: absolute; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center;
            font-size: 260px; font-weight: 900; color: rgba(0,0,0,0.05); 
            z-index: 1; pointer-events: none;
        }

        /* 實體水豚貼圖 */
        .capy-sticker {
            position: absolute; bottom: 10px; right: 20px;
            width: 140px; z-index: 5; pointer-events: none;
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 10; cursor: crosshair; }

        /* 控制區 */
        .controls { margin-top: 20px; display: flex; gap: 15px; }
        
        button, select {
            padding: 12px 25px; border-radius: 30px; border: none;
            font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s;
            box-shadow: 0 5px 0 #795548; background: #8D6E63; color: white;
        }
        button:active { transform: translateY(3px); box-shadow: 0 2px 0 #795548; }
        .btn-score { background: #FF7043; box-shadow: 0 5px 0 #E64A19; }

        /* 慶祝畫面 */
        #celebration {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95); z-index: 100;
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }
        .grade-star { font-size: 120px; color: #FFD54F; text-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="title-container">
        <h1 class="title">🐾 水豚君與小朋友的練習時間 🐾</h1>
    </div>

    <div id="notebook">
        <div class="decoration-bg"></div>
        <div id="guide" class="letter-guide">Aa</div>
        
        <img class="capy-sticker" src="https://img.icons8.com/bubbles/200/capybara.png" alt="capy">

        <canvas id="canvas" width="550" height="420"></canvas>

        <div id="celebration">
            <div class="grade-star" id="gradeIcon">A+</div>
            <h2 style="color: #5D4037;">寫得太棒了！</h2>
            <p style="font-size: 20px;">水豚君給你一顆橘子 🍊</p>
            <button onclick="resetBoard()">繼續挑戰下一個</button>
        </div>
    </div>

    <div class="controls">
        <select id="letterSelect" onchange="updateLetter()"></select>
        <button onclick="resetBoard()" style="background: #A1887F;">重寫</button>
        <button class="btn-score" onclick="getScore()">交卷評分</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const select = document.getElementById('letterSelect');
        const guide = document.getElementById('guide');
        const overlay = document.getElementById('celebration');
        let drawing = false;

        // 初始化選單
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        letters.forEach(l => {
            let opt = document.createElement('option');
            opt.value = l; opt.textContent = `練習 ${l}${l.toLowerCase()}`;
            select.appendChild(opt);
        });

        function updateLetter() {
            guide.textContent = select.value + select.value.toLowerCase();
            resetBoard();
        }

        function resetBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            overlay.style.display = 'none';
        }

        function getScore() {
            const data = ctx.getImageData(0,0,550,420).data;
            let drawCount = 0;
            for(let i=3; i<data.length; i+=4) if(data[i]>0) drawCount++;
            
            document.getElementById('gradeIcon').textContent = drawCount > 800 ? "A+" : "加油";
            overlay.style.display = 'flex';
        }

        // 觸控與滑鼠事件
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const cx = e.clientX || (e.touches && e.touches[0].clientX);
            const cy = e.clientY || (e.touches && e.touches[0].clientY);
            return { x: cx - rect.left, y: cy - rect.top };
        }

        function start(e) {
            drawing = true;
            ctx.beginPath();
            const p = getPos(e);
            ctx.moveTo(p.x, p.y);
        }

        function move(e) {
            if(!drawing) return;
            if(e.touches) e.preventDefault();
            const p = getPos(e);
            ctx.lineTo(p.x, p.y);
            ctx.lineWidth = 14;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#42A5F5'; // 亮藍色
            ctx.stroke();
        }

        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', move);
        window.addEventListener('mouseup', () => drawing = false);
        canvas.addEventListener('touchstart', start, {passive: false});
        canvas.addEventListener('touchmove', move, {passive: false});
        canvas.addEventListener('touchend', () => drawing = false);

        updateLetter();
    </script>
</body>
</html>
