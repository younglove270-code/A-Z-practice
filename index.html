<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>水豚君森林練習帖</title>
    <style>
        body { 
            background: linear-gradient(180deg, #f0f9f0 0%, #d4edda 100%); 
            margin: 0; padding: 20px; font-family: sans-serif; text-align: center; min-height: 100vh;
        }
        h2 { color: #2d5a27; margin-bottom: 10px; }
        .ui-box { margin-bottom: 15px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        
        /* 畫板外框 */
        .container {
            width: 520px; background: white; border: 10px solid #8d6e63;
            border-radius: 40px; margin: 0 auto; position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); touch-action: none;
        }
        canvas { display: block; border-radius: 30px; cursor: crosshair; background: #fff; }

        /* 純 CSS 繪製的水豚君 (保證不報錯) */
        .capy-box {
            position: absolute; bottom: 10px; right: 20px; width: 100px; height: 60px; pointer-events: none;
        }
        .capy-body { width: 80px; height: 50px; background: #d7a98c; border-radius: 50% 50% 40% 40%; position: relative; }
        .capy-ear { width: 10px; height: 10px; background: #b08968; border-radius: 50%; position: absolute; top: 5px; right: 5px; }
        .capy-eye { width: 4px; height: 4px; background: #333; border-radius: 50%; position: absolute; top: 15px; right: 15px; }
        .orange { width: 12px; height: 12px; background: #ff9800; border-radius: 50%; position: absolute; top: -10px; left: 30px; }

        select, button { padding: 12px 20px; border-radius: 25px; border: 2px solid #8d6e63; font-size: 16px; cursor: pointer; }
        button { background: #ff8a65; color: white; border: none; font-weight: bold; }
        #clear { background: #e0e0e0; color: #616161; }

        #grade-win {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); border-radius: 30px;
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 10;
        }
        #grade-text { font-size: 100px; color: #ff5722; margin: 0; }
    </style>
</head>
<body>

    <h2>✨ 水豚君陪你練習 Aa-Zz ✨</h2>

    <div class="ui-box">
        <select id="letterPick"></select>
        <button id="clear">擦乾淨</button>
        <button id="showScore">交卷評分</button>
    </div>

    <div class="container">
        <canvas id="paint" width="500" height="380"></canvas>
        <div class="capy-box">
            <div class="orange"></div>
            <div class="capy-body"><div class="capy-ear"></div><div class="capy-eye"></div></div>
        </div>
        <div id="grade-win">
            <h1 id="grade-text">A+</h1>
            <p style="font-weight: bold; color: #5d4037;">水豚君覺得你寫得超棒！🍊</p>
        </div>
    </div>

    <script>
        // 使用 DOMContentLoaded 確保 HTML 跑完才執行 JS，解決 "canvas is not defined"
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('paint');
            const ctx = canvas.getContext('2d');
            const picker = document.getElementById('letterPick');
            const win = document.getElementById('grade-win');
            let drawing = false;

            // 填寫字母選單
            for(let i=65; i<=90; i++) {
                let char = String.fromCharCode(i);
                let opt = document.createElement('option');
                opt.value = char; opt.innerHTML = `字母 ${char}${char.toLowerCase()}`;
                picker.appendChild(opt);
            }

            function initCanvas() {
                win.style.display = 'none';
                ctx.clearRect(0, 0, 500, 380);
                // 畫輔助線
                ctx.setLineDash([5, 5]); ctx.strokeStyle = '#eee'; ctx.lineWidth = 2;
                [95, 190, 285].forEach(y => { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(500, y); ctx.stroke(); });
                // 畫淺色底字
                ctx.setLineDash([]); ctx.font = 'bold 260px Arial'; ctx.fillStyle = '#f9f9f9';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(picker.value + picker.value.toLowerCase(), 250, 190);
            }

            function getPos(e) {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: clientX - rect.left, y: clientY - rect.top };
            }

            const start = (e) => { drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); };
            const move = (e) => { 
                if(!drawing) return; e.preventDefault();
                const p = getPos(e); ctx.lineTo(p.x, p.y);
                ctx.lineWidth = 12; ctx.lineCap = 'round'; ctx.strokeStyle = '#4a90e2'; ctx.stroke(); 
            };
            const stop = () => drawing = false;

            canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move);
            window.addEventListener('mouseup', stop);
            canvas.addEventListener('touchstart', start); canvas.addEventListener('touchmove', move);
            canvas.addEventListener('touchend', stop);

            document.getElementById('clear').onclick = initCanvas;
            document.getElementById('showScore').onclick = () => win.style.display = 'flex';
            picker.onchange = initCanvas;

            initCanvas();
        });
    </script>
</body>
</html>
