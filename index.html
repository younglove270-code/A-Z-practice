<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>水豚君森林教室 Aa-Zz</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #5D4037; --accent: #FF7043; --bg-forest: #F8FAF0; --border-color: #A1887F; }
        * { box-sizing: border-box; font-family: 'Nunito', 'Microsoft JhengHei', sans-serif; }
        body { background: var(--bg-forest); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .progress-box { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; max-width: 480px; margin-bottom: 10px; }
        .dot { width: 22px; height: 22px; border-radius: 50%; background: #ddd; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #777; }
        .dot.active { background: var(--primary); color: white; transform: scale(1.2); }
        .dot.done { background: var(--accent); color: white; opacity: 0.7; }

        .controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 15px; }
        select, button { padding: 8px 16px; border-radius: 20px; border: 2px solid var(--border-color); font-weight: bold; font-size: 15px; cursor: pointer; background: white; }
        .btn-score { background: var(--accent); color: white; border: none; box-shadow: 0 4px #D84315; }

        .notebook { position: relative; width: 100%; max-width: 500px; aspect-ratio: 4/3; background: white; border: 10px solid var(--border-color); border-radius: 30px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); overflow: hidden; touch-action: none; }
        canvas { position: absolute; top: 0; left: 0; z-index: 10; width: 100%; height: 100%; }
        .capy-img { position: absolute; bottom: 10px; right: 15px; width: 80px; z-index: 5; pointer-events: none; }

        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); z-index: 100; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #grade-text { font-size: 100px; font-weight: 900; margin: 0; color: var(--accent); line-height: 1; }
        #result-word { font-size: 36px; font-weight: 900; color: var(--primary); margin: 15px 0; }
        .icon-large { font-size: 80px; }
    </style>
</head>
<body>

    <div class="progress-box" id="progressBox"></div>

    <div class="controls">
        <select id="letterSelect"></select>
        <button id="btnSpeak">🔊 聽發音</button>
        <button id="btnReset">擦乾淨</button>
        <button class="btn-score" id="btnScore">寫好了！</button>
    </div>

    <div class="notebook">
        <img class="capy-img" src="https://media.base44.com/images/public/69c29b6ba4f1963e90202b13/b46f96e5f_generated_image.png">
        <canvas id="paintCanvas" width="500" height="380"></canvas>
        <div id="overlay">
            <h1 id="grade-text">A+</h1>
            <div id="result-word">E (Egg)</div>
            <div id="result-icon" class="icon-large">🥚</div>
            <p style="font-size: 14px; color: #bbb; margin-top: 20px;">(點擊畫面繼續練習)</p>
        </div>
    </div>

    <script>
        const PHONICS = {
            A: { word: "Apple", icon: "🍎", s: "ah" }, B: { word: "Ball", icon: "⚽", s: "buh" },
            C: { word: "Cat", icon: "🐱", s: "kuh" }, D: { word: "Dog", icon: "🐶", s: "duh" },
            E: { word: "Egg", icon: "🥚", s: "eh" }, F: { word: "Fish", icon: "🐟", s: "fuh" },
            G: { word: "Goat", icon: "🐐", s: "guh" }, H: { word: "Hat", icon: "👒", s: "huh" },
            I: { word: "Igloo", icon: "⛺", s: "ih" }, J: { word: "Jump", icon: "👟", s: "juh" },
            K: { word: "Kite", icon: "🪁", s: "kuh" }, L: { word: "Lion", icon: "🦁", s: "luh" },
            M: { word: "Moon", icon: "🌙", s: "muh" }, N: { word: "Nose", icon: "👃", s: "nuh" },
            O: { word: "Octopus", icon: "🐙", s: "aw" }, P: { word: "Pen", icon: "🖊️", s: "puh" },
            Q: { word: "Queen", icon: "👸", s: "kwuh" }, R: { word: "Rainbow", icon: "🌈", s: "ruh" },
            S: { word: "Sun", icon: "☀️", s: "sss" }, T: { word: "Tree", icon: "🌳", s: "tuh" },
            U: { word: "Umbrella", icon: "☂️", s: "uh" }, V: { word: "Van", icon: "🚐", s: "vuh" },
            W: { word: "Water", icon: "💧", s: "wuh" }, X: { word: "Fox", icon: "🦊", s: "ksss" },
            Y: { word: "Yellow", icon: "💛", s: "yuh" }, Z: { word: "Zebra", icon: "🦓", s: "zzz" }
        };

        const App = {
            currentLetter: 'A',
            isDrawing: false,
            abc: Object.keys(PHONICS),

            init() {
                this.canvas = document.getElementById('paintCanvas');
                this.ctx = this.canvas.getContext('2d', {willReadFrequently: true});
                this.sel = document.getElementById('letterSelect');
                this.overlay = document.getElementById('overlay');
                
                this.abc.forEach(l => {
                    let opt = document.createElement('option');
                    opt.value = l; opt.innerText = `練習 ${l}${l.toLowerCase()}`;
                    this.sel.appendChild(opt);
                });

                document.getElementById('btnSpeak').onclick = () => this.speak(PHONICS[this.currentLetter].s);
                document.getElementById('btnReset').onclick = () => this.reset();
                document.getElementById('btnScore').onclick = () => this.gradeEngine();
                this.overlay.onclick = () => this.overlay.style.display = 'none';
                this.sel.onchange = (e) => { this.currentLetter = e.target.value; this.reset(); };

                const start = (e) => { e.preventDefault(); this.isDrawing = true; this.draw(e, true); };
                const move = (e) => { if(this.isDrawing) { e.preventDefault(); this.draw(e); } };
                this.canvas.onmousedown = start; this.canvas.onmousemove = move; window.onmouseup = () => this.isDrawing = false;
                this.canvas.ontouchstart = start; this.canvas.ontouchmove = move; window.ontouchend = () => this.isDrawing = false;

                this.reset();
            },

            reset() {
                this.ctx.clearRect(0, 0, 500, 380);
                this.overlay.style.display = 'none';
                this.ctx.font = "bold 230px Arial";
                this.ctx.fillStyle = "rgba(0,0,0,0.06)";
                this.ctx.textAlign = "center";
                this.ctx.textBaseline = "middle";
                this.ctx.fillText(this.currentLetter + this.currentLetter.toLowerCase(), 250, 190);
                this.updateProgress();
            },

            draw(e, isStart = false) {
                const r = this.canvas.getBoundingClientRect();
                const cx = e.clientX || (e.touches && e.touches[0].clientX);
                const cy = e.clientY || (e.touches && e.touches[0].clientY);
                const x = (cx - r.left) * (500/r.width);
                const y = (cy - r.top) * (380/r.height);
                if(isStart) this.ctx.beginPath();
                this.ctx.lineWidth = 15; this.ctx.lineCap = 'round'; this.ctx.strokeStyle = '#5D4037';
                this.ctx.lineTo(x, y); this.ctx.stroke();
            },

            speak(text) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = "en-US"; u.rate = 0.8;
                window.speechSynthesis.speak(u);
            },

            gradeEngine() {
                const CANVAS_W = 500, CANVAS_H = 380;
                const offCanvas = document.createElement('canvas');
                offCanvas.width = CANVAS_W; offCanvas.height = CANVAS_H;
                const octx = offCanvas.getContext('2d');
                octx.font = "bold 230px Arial"; octx.textAlign = "center"; octx.textBaseline = "middle";
                octx.fillText(this.currentLetter + this.currentLetter.toLowerCase(), 250, 190);
                
                const templateData = octx.getImageData(0,0,CANVAS_W,CANVAS_H).data;
                const studentData = this.ctx.getImageData(0,0,CANVAS_W,CANVAS_H).data;

                let hit = 0, totalTemplate = 0, studentPixels = 0;
                for(let i=3; i<templateData.length; i+=4) {
                    if(templateData[i] > 50) totalTemplate++;
                    if(studentData[i] > 150) {
                        studentPixels++;
                        if(templateData[i] > 50) hit++;
                    }
                }

                if(studentPixels < 500) { alert("快動筆寫寫看吧！"); return; }

                const coverage = hit / totalTemplate;
                const accuracy = hit / studentPixels;
                const score = (coverage * 0.6 + accuracy * 0.4) * 100;

                let grade = "C";
                if(score > 55) grade = "A+";
                else if(score > 30) grade = "B";

                this.showOverlay(grade);
            },

            showOverlay(grade) {
                const info = PHONICS[this.currentLetter];
                document.getElementById('grade-text').innerText = grade;
                document.getElementById('result-word').innerText = `${this.currentLetter} (${info.word})`;
                document.getElementById('result-icon').innerText = info.icon;
                this.overlay.style.display = 'flex';

                // 語音邏輯
                let feedback = "";
                if(grade === "A+") feedback = `Woohoo! Excellent! ${info.word}`;
                else if(grade === "B") feedback = `You will be even better! ${info.word}`;
                else feedback = `You can try again and be even better! ${info.word}`;

                this.speak(feedback);
            },

            updateProgress() {
                const box = document.getElementById('progressBox');
                box.innerHTML = '';
                const currIdx = this.abc.indexOf(this.currentLetter);
                this.abc.forEach((l, i) => {
                    const d = document.createElement('div');
                    d.className = `dot ${i === currIdx ? 'active' : (i < currIdx ? 'done' : '')}`;
                    d.innerText = l; box.appendChild(d);
                });
            }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>
