<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>水豚君森林練習本</title>
    <style>
        :root {
            --soft-bg: #F1F8E9; /* 柔和草綠色背景 */
            --notebook-edge: #A1887F; /* 實體書棕色邊框 */
            --capy-line: #5D4037; /* 棕色字體 */
            --ink-blue: #45AAF2;
        }

        /* 🌍 全局森林系背景：淡雅柔和草綠 */
        body { 
            background: 
                /* 森林小草紋理 */
                linear-gradient(to top, #A5D6A7 5%, transparent 20%),
                var(--soft-bg);
            text-align: center; 
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; 
            margin: 0; padding: 15px; 
            color: var(--capy-line);
            overflow: hidden; 
        }

        h2 { 
            color: var(--capy-line); 
            margin: 10px 0; 
            font-size: 26px;
        }

        /* 練習本容器：富有質感的圓角與棕色邊框 */
        #box { 
            width: 500px; height: 380px; 
            background: white; 
            border: 10px solid var(--notebook-edge); 
            border-radius: 35px; 
            margin: 10px auto; 
            position: relative; 
            box-shadow: 0 8px 25px rgba(166, 124, 95, 0.2); 
            touch-action: none; 
            overflow: hidden;
        }

        canvas { 
            display: block; 
            border-radius: 27px; 
            background: transparent; 
            position: relative; z-index: 5; /* 畫布在浮水印之上 */
        }

        /* 🌟 核心：更萌、實體化的水豚君貼圖 (內嵌Base64圖片，絕對會顯示不出) */
        #box::before {
            content: '';
            position: absolute;
            bottom: 15px; /* 懶懶趴在右下角 */
            right: 15px;
            width: 140px; /* 放大一點，更有陪伴感 */
            height: 90px;
            opacity: 0.8; /* 調淡，像浮水印一樣不干擾寫字 */
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48ZWxsaXBzZSBjeD0iNTAiIGN5PSI1NSIgcng9IjQ1IiByeT0iMzUiIGZpbGw9IiNEO0E5OEMiIHN0cm9rZT0iIzVENDAzNyIgc3Ryb2tlLXdpZHRoPSIyIi8+PGVsbGlwc2UgY3g9IjgwIiBjeT0iNjUiIHJ4PSIyMCIgcnk9IjI1IiBmaWxsPSIjQTY3QzVGIiBzdHJva2U9IiM1RDQwMzciIHN0cm9rZS13aWR0aPSIyIi8+PHJlY3QgeD0iNDAiIHk9IjMwIiB3aWR0aD0iMTUiIGhlaWdodD0iMyIgcng9IjEuNSIgZmlsbD0iIzVENDAzNyIgdHJhbnNmb3JtPSJyb3RhdGUoLTEwIDQ3LjUgMzEuNSkiLz48dGV4dCB4PSI3NSIgeT0iMzAiIGZvbnQtc2l6ZT0iMjAiPuS7qTwvdGV4dD48L3N2Zz4=');
            background-repeat: no-repeat;
            background-size: contain;
            z-index: 1; /* 底圖，寫在畫布之下 */
            pointer-events: none;
        }

        /* 控制區按鈕：更圓潤、焦糖棕色系 */
        .ui { margin-bottom: 15px; display: flex; justify-content: center; gap: 12px; align-items: center; }
        select, button { 
            padding: 10px 20px; font-size: 16px; 
            border-radius: 25px; border: 2px solid #E0E0E0; 
            cursor: pointer; font-family: inherit;
        }
        select { background-color: #fff; color: #5D4037; }
        .score-btn { background: #FFAB91; color: white; border: none; font-weight: bold; }
        .reset-btn { background: #E6D5C3; color: #5D4037; border: none; font-weight: bold; }

        /* 🎉 貼圖風歡呼動畫浮層 */
        #celebration-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; background: rgba(255, 255, 255, 0.96); 
            border-radius: 27px; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 100; 
            animation: fadeIn 0.3s;
        }
        #grade { 
            font-size: 110px; font-weight: 900; color: #FF7043; margin: -10px 0; 
            text-shadow: 3px 3px 0px #FFE0B2;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 手機 RWD */
        @media (max-width: 500px) {
            #box { width: 95vw; height: 71vw; border-width: 5px; margin: 5px auto; }
            h2 { font-size: 22px; }
            .ui { flex-wrap: wrap; gap: 8px; }
            select, button { padding: 10px 15px; font-size: 14px; }
            #grade { font-size: 80px; }
            #notebook-edge { border-width: 5px; }
        }
    </style>
</head>
<body>

    <h2 class="title">✨ 水豚君陪你學英文 Aa-Zz ✨</h2>
    
    <div class="ui">
        <select id="letterSelect"></select>
        <button class="reset-btn" id="resetBtn">擦乾淨</button>
        <button class="score-btn" id="scoreBtn">看分數</button>
    </div>

    <div id="box">
        <canvas id="c" width="500" height="380"></canvas>
        
        <div id="celebration-overlay">
            <h1 id="grade">A+</h1>
            <p style="font-size: 20px; font-weight: bold; color: #5D4037;">寫得太漂亮了！送你一顆橘子🍊</p>
        </div>
    </div>

    <script>
        (function() {
            var cvs = document.getElementById('c'), ctx = cvs.getContext('2d');
            var sel = document.getElementById('letterSelect'), overlay = document.getElementById('celebration-overlay');
            var drawing = false;

            // 初始化選單
            var alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
            alphabet.forEach(function(l) {
                var opt = document.createElement('option'); opt.value = l; opt.innerHTML = "練習 " + l + l.toLowerCase(); sel.appendChild(opt);
            });

            function initBoard() {
                overlay.style.display = 'none';
                ctx.clearRect(0, 0, 500, 380);
                
                // 畫格線 (調整顏色更融合森林系)
                ctx.setLineDash([8, 8]); ctx.lineWidth = 1.5; ctx.strokeStyle = "#E6D5C3";
                [90, 144, 198, 252].forEach(function(y) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(500, y); ctx.stroke(); });
                ctx.setLineDash([]);
                
                // 畫字母底字
                ctx.font = 'bold 240px Arial'; ctx.fillStyle = '#F5F5F5'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(sel.value + sel.value.toLowerCase(), 250, 190);
            }

            // --- 寫字功能 ---
            function getPos(e) {
                var r = cvs.getBoundingClientRect();
                var clientX = e.clientX || (e.touches && e.touches[0].clientX);
                var clientY = e.clientY || (e.touches && e.touches[0].clientY);
                return { x: clientX - r.left, y: clientY - r.top };
            }
            function start(e) { drawing = true; ctx.beginPath(); var p = getPos(e); ctx.moveTo(p.x, p.y); }
            function move(e) {
                if (!drawing) return; e.preventDefault();
                var p = getPos(e);
                ctx.lineWidth = 16; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.strokeStyle = '#4FC3F7';
                ctx.lineTo(p.x, p.y); ctx.stroke();
                // 每次畫完一小段重新開啟路徑，防止出現毛邊
                ctx.beginPath(); ctx.moveTo(p.x, p.y); 
            }
            function stop() { drawing = false; }

            // 事件監聽與評分功能
            document.getElementById('scoreBtn').onclick = () => overlay.style.display = 'flex';
            document.getElementById('resetBtn').onclick = initBoard;
            sel.onchange = initBoard;
            
            canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move); window.addEventListener('mouseup', stop);
            canvas.addEventListener('touchstart', start, {passive: false}); canvas.addEventListener('touchmove', move, {passive: false}); canvas.addEventListener('touchend', stop);

            initBoard(); // 啟動
        })();
    </script>
</body>
</html>
