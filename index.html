<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>水豚君森林教室 Aa-Zz</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #5D4037; --accent: #FF7043; --bg-forest: #F8FAF0; --border-color: #A1887F; }
        * { box-sizing: border-box; font-family: 'Nunito', sans-serif; }
        body { background: var(--bg-forest); margin: 0; padding: 15px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .header { margin-bottom: 10px; text-align: center; }
        .icons { font-size: 40px; margin-bottom: 5px; }
        h1 { font-weight: 900; color: var(--primary); margin: 0; font-size: 24px; }
        
        /* 進度條樣式 */
        .progress-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; max-width: 500px; margin: 15px auto; }
        .progress-dot { width: 28px; height: 28px; border-radius: 50%; font-size: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; background: #ddd; color: #777; transition: all 0.3s; }
        .progress-dot.active { background: var(--primary); color: white; transform: scale(1.2); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .progress-dot.done { background: var(--accent); color: white; opacity: 0.8; }

        .controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 15px; }
        select, button { padding: 10px 18px; border-radius: 25px; border: 2px solid var(--border-color); font-weight: bold; font-size: 16px; cursor: pointer; background: white; }
        .btn-score { background: var(--accent); color: white; border: none; box-shadow: 0 4px #D84315; }

        .notebook { position: relative; width: 100%; max-width: 500px; aspect-ratio: 4/3; background: white; border: 10px solid var(--border-color); border-radius: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; touch-action: none; }
        canvas { position: absolute; top: 0; left: 0; z-index: 10; cursor: crosshair; }
        
        /* 修正後的圖片載入 */
        .capy-img { position: absolute; bottom: 10px; right: 15px; width: 100px; z-index: 5; pointer-events: none; }

        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.96); z-index: 100; display: none; flex-direction: column; justify-content: center; align-items: center; }
        #grade-text { font-size: 100px; font-weight: 900; margin: 0; color: var(--accent); }
    </style>
</head>
<body>

    <div class="header">
        <div class="icons">🎒 🌿 🌲 🍎</div>
        <h1>✨ 水豚君森林教室 Aa-Zz ✨</h1>
    </div>

    <div class="progress-container" id="progressBox"></div>

    <div class="controls">
        <select id="letterSelect"></select>
        <button id="btnSpeak">🔊 聽發音</button>
        <button id="btnReset">擦乾淨</button>
        <button class="btn-score" id="btnScore">交卷！</button>
    </div>

    <div class="notebook">
        <img class="capy-img" src="https://media.base44.com/images/public/69c29b6ba4f1963e90202b13/b46f96e5f_generated_image.png" alt="Capybara">
        <canvas id="paintCanvas" width="500" height="380"></canvas>
        <div id="overlay">
            <h1 id="grade-text">A+</h1>
            <p id="feedback-text" style="font-weight:bold;"></p>
            <p style="font-size: 12px; color: #999;">(點擊畫面繼續)</p>
        </div>
    </div>

    <script>
        // 封裝所有邏輯在一個物件中，避免全域變數污染與定義錯誤
        const App = {
            currentLetter: 'A',
            isDrawing: false,
            hasDrawn: false,
            abc: "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split(""),
            phonics: {
                A: { v: "ah", p: "A says /æ/ as in Apple!" },
                B: { v: "buh", p: "B says /b/ as in Ball!" },
                C: { v: "kuh", p: "C says /k/ as in Cat!" },
                D: { v: "duh", p: "D says /d/ as in Dog!" },
                E: { v: "eh", p: "E says /ɛ/ as in Egg!" },
                F: { v: "fuh", p: "F says /f/ as in Fish!" },
                G: { v: "guh", p: "G says /g/ as in Goat!" },
                H: { v: "huh", p: "H says /h/ as in Hat!" },
                I: { v: "ih", p: "I says /ɪ/ as in Igloo!" },
                J: { v: "juh", p: "J says /dʒ/ as in Jump!" },
                K: { v: "kuh", p: "K says /k/ as in Kite!" },
                L: { v: "luh", p: "L says /l/ as in Lion!" },
                M: { v: "muh", p: "M says /m/ as in Moon!" },
                N: { v: "nuh", p: "N says /n/ as in Nose!" },
                O: { v: "aw", p: "O says /ɒ/ as in Octopus!" },
                P: { v: "puh", p: "P says /p/ as in Pen!" },
                Q: { v: "kwuh", p: "Q says /kw/ as in Queen!" },
                R: { v: "ruh", p: "R says /r/ as in Rainbow!" },
                S: { v: "sss", p: "S says /s/ as in Sun!" },
                T: { v: "tuh", p: "T says /t/ as in Tree!" },
                U: { v: "uh", p: "U says /ʌ/ as in Umbrella!" },
                V: { v: "vuh", p: "V says /v/ as in Van!" },
                W: { v: "wuh", p: "W says /w/ as in Water!" },
                X: { v: "ksss", p: "X says /ks/ as in Fox!" },
                Y: { v: "yuh", p: "Y says /j/ as in Yellow!" },
                Z: { v: "zzz", p: "Z says /z/ as in Zebra!" }
            },

            init() {
                this.canvas = document.getElementById('paintCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.sel = document.getElementById('letterSelect');
                this.overlay = document.getElementById('overlay');
                
                // 初始化下拉選單
                this.abc.forEach(l => {
                    let opt = document.createElement('option');
                    opt.value = l; opt.innerHTML = `練習字母 ${l}${l.toLowerCase()}`;
                    this.sel.appendChild(opt);
                });

                // 綁定事件 (解決按鈕找不到 function 的問題)
                document.getElementById('btnSpeak').onclick = () => this.speak();
                document.getElementById('btnReset').onclick = () => this.reset();
                document.getElementById('btnScore').onclick = () => this.submit();
                this.overlay.onclick = () => this.overlay.style.display = 'none';
                this.sel.onchange = (e) => { this.currentLetter = e.target.value; this.reset(); };

                // 繪圖事件
                this.canvas.addEventListener('mousedown', (e) => this.start(e));
                this.canvas.addEventListener('mousemove', (e) => this.move(e));
                window.addEventListener('mouseup', () => this.isDrawing = false);
                this.canvas.addEventListener('touchstart', (e) => this.start(e));
                this.canvas.addEventListener('touchmove', (e) => this.move(e));
                
                this.reset();
            },

            reset() {
                this.overlay.style.display = 'none';
                this.hasDrawn = false;
                this.ctx.clearRect(0, 0, 500, 380);
                
                // 畫底字範本
                this.ctx.font = "bold 220px Arial";
                this.ctx.fillStyle = "rgba(0,0,0,0.07)";
                this.ctx.textAlign = "center";
                this.ctx.textBaseline = "middle";
                this.ctx.fillText(this.currentLetter + this.currentLetter.toLowerCase(), 250, 190);

                // 畫輔助線
                this.ctx.setLineDash([8, 8]);
                this.ctx.strokeStyle = "#E6D5C3";
                [90, 144, 198, 252].forEach(y => {
                    this.ctx.beginPath(); this.ctx.moveTo(0, y); this.ctx.lineTo(500, y); this.ctx.stroke();
                });
                this.ctx.setLineDash([]);
                this.updateProgress();
            },

            getPos(e) {
                const r = this.canvas.getBoundingClientRect();
                const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                return {
                    x: (clientX - r.left) * (500 / r.width),
                    y: (clientY - r.top) * (380 / r.height)
                };
            },

            start(e) {
                e.preventDefault();
                this.isDrawing = true;
                this.hasDrawn = true;
                const p = this.getPos(e);
                this.ctx.beginPath();
                this.ctx.moveTo(p.x, p.y);
            },

            move(e) {
                if (!this.isDrawing) return;
                e.preventDefault();
                const p = this.getPos(e);
                this.ctx.lineWidth = 14;
                this.ctx.lineCap = "round";
                this.ctx.strokeStyle = "#4FC3F7";
                this.ctx.lineTo(p.x, p.y);
                this.ctx.stroke();
            },

            speak() {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(this.phonics[this.currentLetter].v);
                u.lang = "en-US"; u.rate = 0.7;
                window.speechSynthesis.speak(u);
            },

            submit() {
                if (!this.hasDrawn) {
                    this.showResult("😶", "還沒寫字喔！", "#9E9E9E");
                    return;
                }
                const msg = `太棒了！ ${this.phonics[this.currentLetter].p}`;
                this.showResult("A+", msg, "#FF7043");
                
                const u = new SpeechSynthesisUtterance(msg);
                u.lang = "en-US"; window.speechSynthesis.speak(u);

                // 自動跳下一格
                setTimeout(() => {
                    let idx = this.abc.indexOf(this.currentLetter);
                    if (idx < 25) {
                        this.currentLetter = this.abc[idx + 1];
                        this.sel.value = this.currentLetter;
                        this.reset();
                    }
                }, 2500);
            },

            showResult(grade, msg, color) {
                document.getElementById('grade-text').innerText = grade;
                document.getElementById('grade-text').style.color = color;
                document.getElementById('feedback-text').innerText = msg;
                this.overlay.style.display = 'flex';
            },

            updateProgress() {
                const box = document.getElementById('progressBox');
                box.innerHTML = '';
                const currIdx = this.abc.indexOf(this.currentLetter);
                this.abc.forEach((l, i) => {
                    const dot = document.createElement('div');
                    dot.className = `progress-dot ${i === currIdx ? 'active' : (i < currIdx ? 'done' : '')}`;
                    dot.innerText = l;
                    box.appendChild(dot);
                });
            }
        };

        // 核心修正：確保在 DOM 完全載入後才執行初始化
        window.addEventListener('DOMContentLoaded', () => {
            App.init();
        });
    </script>
</body>
</html>
