<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>水豚君森林練習帖</title>
    <style>
        :root {
            --capy-brown: #9E7B5C; /* 實體棕色 */
            --grass-green: #D4EDDA; /* 留下的草地漸層色 */
            --chalk-blue: #45AAF2;
        }

        /* 留下的背景：柔和的森林綠漸層 */
        body { 
            background: linear-gradient(180deg, #F9FDF9 0%, var(--grass-green) 100%);
            text-align: center; 
            font-family: "Microsoft JhengHei", sans-serif; 
            margin: 0; padding: 20px; 
            color: #5D4037;
            overflow: hidden; 
        }

        .title { color: #5D4037; font-size: 28px; margin-bottom: 20px; text-shadow: 2px 2px white; }

        /* 畫布容器：手繪感圓角 */
        #box { 
            width: 480px; height: 360px; 
            background: white; 
            border: 8px solid #E6D5C3; 
            border-radius: 35px; 
            margin: 10px auto; 
            position: relative; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); 
            touch-action: none; 
            overflow: hidden;
        }

        canvas { 
            display: block; 
            border-radius: 27px; 
            background: transparent; 
            position: relative; z-index: 5; /* 畫布在浮水印之上 */
        }

        /* 字母底字 (稍微加深一點，確保看不見) */
        .guide-text { 
            position: absolute; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center;
            font-size: 240px; font-weight: bold; color: #F0F0F0; 
            z-index: 1; pointer-events: none;
        }

        /* 🌟 核心：更萌、實體化的水豚君貼圖 (內嵌Base64圖片，絕對不會顯示不出) */
        #capy-sticker {
            position: absolute;
            bottom: -5px; /* 懶懶趴在邊緣 */
            left: 15px;
            width: 140px; /* 放大一點，更有陪伴感 */
            height: auto;
            z-index: 5; /* 在格子之上，確保被看到 */
            pointer-events: none;
            opacity: 0.9;
            content: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48ZWxsaXBzZSBjeD0iNTAiIGN5PSI1NSIgcng9IjQ1IiByeT0iMzUiIGZpbGw9IiNEO0E5OEMiIHN0cm9rZT0iIzVENDAzNyIgc3Ryb2tlLXdpZHRoPSIyIi8+PGVsbGlwc2UgY3g9IjgwIiBjeT0iNjUiIHJ4PSIyMCIgcnk9IjI1IiBmaWxsPSIjQTY3QzVGIiBzdHJva2U9IiM1RDQwMzciIHN0cm9rZS13aWR0aPSIyIi8+PHJlY3QgeD0iNDAiIHk9IjMwIiB3aWR0aD0iMTUiIGhlaWdodD0iMyIgcng9IjEuNSIgZmlsbD0iIzVENDAzNyIgdHJhbnNmb3JtPSJyb3RhdGUoLTEwIDQ3LjUgMzEuNSkiLz48dGV4dCB4PSI3NSIgeT0iMzAiIGZvbnQtc2l6ZT0iMjAiPuS7qTwvdGV4dD48L3N2Zz4=');
        }

        /* 介面按鈕：焦糖棕色系 */
        .ui { margin-bottom: 15px; display: flex; justify-content: center; gap: 12px; align-items: center; }
        select, button { 
            padding: 10px 20px; font-size: 16px; 
            border-radius: 25px; border: 2px solid #E0E0E0; 
            cursor: pointer; font-family: inherit;
        }
        select { background-color: #fff; color: #5D4037; }
        .score-btn { background: #FFAB91; color: white; border: none; font-weight: bold; }
        .reset-btn { background: #E6D5C3; color: #5D4037; border: none; font-weight: bold; }

        /* 🎉 貼圖風歡呼動畫浮層 */
        #celebration-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; background: rgba(255, 255, 255, 0.96); 
            border-radius: 27px; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 100; 
            animation: fadeIn 0.3s;
        }
        #grade { 
            font-size: 110px; font-weight: 900; color: #FF7043; margin: -10px 0; 
            text-shadow: 3px 3px 0px #FFE0B2;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 手機 RWD */
        @media (max-width: 500px) {
            #box { width: 95vw; height: 71vw; border-width: 5px; margin: 5px auto; }
            h2 { font-size: 22px; }
            .ui { flex-wrap: wrap; gap: 8px; }
            select, button { padding: 10px 15px; font-size: 14px; }
            #grade { font-size: 80px; }
            #capy-sticker { width: 110px; }
        }
    </style>
</head>
<body>

    <h2 class="title">✨ 水豚君陪你練習 Aa-Zz ✨</h2>
    
    <div class="ui">
        <select id="letterSel"></select>
        <button class="reset-btn" id="resBtn">重寫</button>
        <button class="score-btn" id="scoBtn">看分數</button>
    </div>

    <div id="box">
        <div class="guide-text" id="guidTxt">Aa</div>
        
        <div id="capy-sticker"></div>

        <canvas id="c" width="480" height="360"></canvas>
        
        <div id="celebration-overlay">
            <h1 id="grade">A+</h1>
            <p style="font-size: 20px; font-weight: bold; color: #5D4037;">寫得太漂亮了！送你一顆橘子🍊</p>
        </div>
    </div>

    <script>
        (function() {
            const cvs = document.getElementById('c'), ctx = cvs.getContext('2d');
            const letterSel = document.getElementById('letterSel'), overlay = document.getElementById('celebration-overlay');
            let alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split(""), drawing = false;

            // 初始化選單
            alphabet.forEach(function(letter) {
                var opt = document.createElement('option'); opt.value = letter; opt.innerHTML = "練習 " + letter + letter.toLowerCase(); letterSel.appendChild(opt);
            });

            function initCanvas() {
                ctx.clearRect(0, 0, 480, 360);
                // 字母底字
                document.getElementById('guidTxt').textContent = letterSel.value + letterSel.value.toLowerCase();
                overlay.style.display = 'none';
                
                // 畫四線格
                ctx.setLineDash([8, 8]); ctx.lineWidth = 1.5; ctx.strokeStyle = "#E6D5C3";
                [90, 144, 198, 252].forEach(function(y) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(480, y); ctx.stroke(); });
                ctx.setLineDash([]);
            }

            // --- 寫字功能 ---
            function getPos(e) {
                var r = cvs.getBoundingClientRect();
                var clientX = e.clientX || (e.touches && e.touches[0].clientX);
                var clientY = e.clientY || (e.touches && e.touches[0].clientY);
                return { x: clientX - r.left, y: clientY - r.top };
            }

            function start(e) { drawing = true; ctx.beginPath(); var p = getPos(e); ctx.moveTo(p.x, p.y); }
            function move(e) {
                if (!drawing) return; e.preventDefault();
                var p = getPos(e);
                ctx.lineWidth = 16; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.strokeStyle = '#4FC3F7';
                ctx.lineTo(p.x, p.y); ctx.stroke();
            }
            function stop() { drawing = false; }

            // 自動跳轉選單
            document.getElementById('scoBtn').onclick = () => { overlay.style.display = 'flex'; setTimeout(() => { if(letterSel.selectedIndex < 25) { letterSel.selectedIndex++; initCanvas(); } }, 2000); };
            document.getElementById('resBtn').onclick = initCanvas;
            letterSel.onchange = initCanvas;

            // 事件綁定
            cvs.addEventListener('mousedown', start); cvs.addEventListener('mousemove', move); window.addEventListener('mouseup', stop);
            cvs.addEventListener('touchstart', start, {passive: false}); cvs.addEventListener('touchmove', move, {passive: false}); cvs.addEventListener('touchend', stop);

            initCanvas(); // 啟動
        })();
    </script>
</body>
</html>
