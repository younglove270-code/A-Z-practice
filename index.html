<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>水豚君森林練習本</title>
    <style>
        :root {
            --capy-brown: #9E7B5C;
            --capy-light: #D7B98E;
            --forest-green: #A8D5BA;
            --soft-bg: #F9F3E7;
        }

        body { 
            background-color: var(--soft-bg); 
            background-image: radial-gradient(#E6D5C3 1px, transparent 1px);
            background-size: 20px 20px;
            text-align: center; 
            font-family: "Microsoft JhengHei", sans-serif; 
            margin: 0; padding: 20px; 
        }

        .header { margin-bottom: 20px; }
        .title { color: #5D4037; font-size: 28px; font-weight: bold; text-shadow: 2px 2px white; }

        .ui-panel { 
            background: white; width: fit-content; margin: 0 auto 20px;
            padding: 10px 20px; border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex; gap: 15px; align-items: center;
        }

        /* 畫布容器 */
        #container { 
            width: 500px; height: 400px; margin: 0 auto; position: relative;
            background: white; border: 12px solid #D7C4B1; border-radius: 40px;
            box-shadow: 0 15px 30px rgba(158, 123, 92, 0.2);
            overflow: hidden;
        }

        /* 水豚君浮水印 */
        .capy-watermark {
            position: absolute; bottom: 10px; right: 10px; width: 100px; height: 70px;
            background: var(--capy-brown); border-radius: 50px 50px 10px 10px;
            opacity: 0.3; pointer-events: none; z-index: 5;
        }
        .capy-watermark::before { content: "● ●"; color: #333; position: absolute; top: 20px; left: 25px; letter-spacing: 15px; }

        .letter-bg { 
            position: absolute; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center;
            font-size: 250px; font-weight: bold; color: #F0F0F0; 
            z-index: 1; user-select: none; pointer-events: none;
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 10; cursor: url('https://img.icons8.com/color/32/000000/pencil.png'), auto; }

        button { 
            padding: 8px 25px; border-radius: 20px; border: none; 
            font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-reset { background: #E0E0E0; color: #666; }
        .btn-score { background: #FF8A65; color: white; }
        button:hover { transform: scale(1.05); }

        /* 結算畫面 */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95); z-index: 100; display: none;
            flex-direction: column; justify-content: center; align-items: center;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        #grade { font-size: 120px; color: #FF7043; margin: 0; filter: drop-shadow(2px 5px 0px #FFE0B2); }
        .decoration { position: absolute; width: 100%; height: 100%; pointer-events: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="title">🍊 水豚君の英文練習帖 🍊</div>
    </div>

    <div class="ui-panel">
        <select id="letterSelect" style="font-size: 18px; padding: 5px; border-radius: 10px;"></select>
        <button class="btn-reset" id="resetBtn">擦乾淨</button>
        <button class="btn-score" id="scoreBtn">交卷評分</button>
    </div>

    <div id="container">
        <div id="letterGuide" class="letter-bg">Aa</div>
        
        <div class="capy-watermark"></div>
        
        <canvas id="canvas" width="500" height="400"></canvas>
        
        <div id="overlay">
            <p style="font-size: 24px; color: #8D6E63; margin: 0;">水豚君給你...</p>
            <h1 id="grade">A+</h1>
            <p id="msg" style="font-size: 20px; font-weight: bold; color: #5D4037;">寫得太漂亮了！</p>
            <button class="btn-reset" onclick="document.getElementById('overlay').style.display='none'">再練一次</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const select = document.getElementById('letterSelect');
            const guide = document.getElementById('letterGuide');
            const overlay = document.getElementById('overlay');
            let drawing = false;

            // 建立 A-Z
            for(let i=65; i<=90; i++) {
                let char = String.fromCharCode(i);
                let opt = document.createElement('option');
                opt.value = char;
                opt.textContent = `字母 ${char}${char.toLowerCase()}`;
                select.appendChild(opt);
            }

            function clear() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                guide.textContent = select.value + select.value.toLowerCase();
                overlay.style.display = 'none';
            }

            function start(e) {
                drawing = true;
                ctx.beginPath();
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - rect.left;
                const y = (e.clientY || e.touches[0].clientY) - rect.top;
                ctx.moveTo(x, y);
            }

            function move(e) {
                if (!drawing) return;
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - rect.left;
                const y = (e.clientY || e.touches[0].clientY) - rect.top;
                ctx.lineWidth = 12;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.strokeStyle = '#5482A9'; // 蠟筆深藍色
                ctx.lineTo(x, y);
                ctx.stroke();
            }

            function stop() { drawing = false; }

            function score() {
                const data = ctx.getImageData(0,0,500,400).data;
                let count = 0;
                for(let i=3; i<data.length; i+=4) if(data[i]>0) count++;
                
                document.getElementById('grade').textContent = count > 500 ? "A+" : "加油";
                document.getElementById('msg').textContent = count > 500 ? "水豚君覺得很棒！🍊" : "再多畫幾筆吧！";
                overlay.style.display = 'flex';
            }

            canvas.addEventListener('mousedown', start);
            canvas.addEventListener('mousemove', move);
            window.addEventListener('mouseup', stop);
            canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); });
            canvas.addEventListener('touchmove', (e) => { e.preventDefault(); move(e); });
            canvas.addEventListener('touchend', stop);

            document.getElementById('resetBtn').onclick = clear;
            document.getElementById('scoreBtn').onclick = score;
            select.onchange = clear;

            clear();
        });
    </script>
</body>
</html>
