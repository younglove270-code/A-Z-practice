<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>水豚君英文練習 Aa-Zz</title>
    <style>
        :root {
            --capy-brown: #8D6E63;
            --capy-light: #D7CCC8;
            --bg-color: #FDF5E6;
        }

        body { 
            background: var(--bg-color); 
            text-align: center; 
            font-family: sans-serif; 
            margin: 0; padding: 15px; 
            color: #5D4037;
            overflow: hidden; /* 防止連寫時畫面晃動 */
        }

        #box { 
            width: 480px; height: 360px; 
            background: white; 
            border: 8px solid var(--capy-light); 
            border-radius: 30px; 
            margin: 10px auto; 
            position: relative; 
            box-shadow: 0 6px 20px rgba(141, 110, 99, 0.2); 
            touch-action: none;
        }

        canvas { display: block; border-radius: 22px; background: transparent; position: relative; z-index: 5; }

        /* 水豚底圖背景 */
        #capy-bg {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 200px; height: 200px;
            opacity: 0.1;
            z-index: 2;
            pointer-events: none;
        }

        .ui { margin-bottom: 15px; display: flex; justify-content: center; gap: 12px; align-items: center; }

        select, button { padding: 12px 18px; font-size: 16px; border-radius: 20px; border: 2px solid var(--capy-light); cursor: pointer; }

        .score-btn { background: var(--capy-brown); color: white; border: none; font-weight: bold; }

        /* 🎉 水豚歡呼動畫層 */
        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; background: rgba(255, 255, 255, 0.9); 
            border-radius: 22px; flex-direction: column; justify-content: center; align-items: center; z-index: 100; 
        }

        .cheer-img { width: 150px; animation: bounce 0.6s infinite alternate; }
        #grade { font-size: 80px; font-weight: bold; color: #FF7043; margin: 0; }

        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-20px); } }
        
        @media (max-width: 500px) { #box { width: 95vw; height: 71vw; } }
    </style>
</head>
<body>

    <h2>✨ 水豚君陪你寫英文 ✨</h2>
    
    <div class="ui">
        <select id="sel"></select>
        <button id="resetBtn">重寫</button>
        <button class="score-btn" id="scoreBtn">看分數</button>
    </div>

    <div id="box">
        <svg id="capy-bg" viewBox="0 0 100 100">
            <path d="M85,55 C95,55,95,75,85,75 L80,75 L80,80 C80,85,70,85,70,80 L70,75 L30,75 L30,80 C30,85,20,85,20,80 L20,75 L15,75 C5,75,5,55,15,55 L20,55 L20,50 C20,30,40,20,60,20 C75,20,80,30,80,45 L80,55 L85,55 Z" fill="#8D6E63"/>
            <circle cx="50" cy="35" r="3" fill="#3E2723"/>
            <circle cx="70" cy="45" r="3" fill="#3E2723"/>
        </svg>
        
        <canvas id="c" width="480" height="360"></canvas>
        
        <div id="overlay">
            <svg class="cheer-img" viewBox="0 0 100 100">
                <path d="M80,50 C90,50,90,70,80,70 L75,70 L75,75 C75,80,65,80,65,75 L65,70 L25,70 L25,75 C25,80,15,80,15,75 L15,70 L10,70 C0,70,0,50,10,50 L15,50 L15,45 C15,25,35,15,55,15 C70,15,75,25,75,40 L75,50 L80,50 Z" fill="#8D6E63"/>
                <text x="30" y="60" font-size="20" fill="white">🎉</text>
            </svg>
            <div id="grade">A+</div>
            <p id="msg">太棒了！水豚君為你歡呼</p>
        </div>
    </div>

    <script>
        const cvs = document.getElementById('c'), ctx = cvs.getContext('2d');
        const sel = document.getElementById('sel'), overlay = document.getElementById('overlay');
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        let drawing = false;

        alphabet.forEach(l => {
            let opt = document.createElement('option');
            opt.value = l; opt.innerText = `練習 ${l}${l.toLowerCase()}`;
            sel.appendChild(opt);
        });

        function init() {
            overlay.style.display = 'none';
            ctx.clearRect(0, 0, 480, 360);
            ctx.setLineDash([5, 5]); ctx.lineWidth = 1; ctx.strokeStyle = "#D7CCC8";
            [90, 144, 198, 252].forEach(y => { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(480,y); ctx.stroke(); });
            ctx.setLineDash([]);
            ctx.font = 'bold 220px Arial'; ctx.fillStyle = '#F0F0F0'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(sel.value + sel.value.toLowerCase(), 240, 180);
        }

        const getPos = e => {
            const r = cvs.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - r.left;
            const y = (e.clientY || e.touches[0].clientY) - r.top;
            return {x, y};
        };

        const start = e => { drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); };
        const move = e => {
            if(!drawing) return;
            const p = getPos(e);
            ctx.lineWidth = 15; ctx.lineCap = 'round'; ctx.strokeStyle = '#45AAF2';
            ctx.lineTo(p.x, p.y); ctx.stroke();
        };

        document.getElementById('scoreBtn').onclick = () => {
            // 簡化判定邏輯，避免 file:// 權限問題
            document.getElementById('grade').innerText = "A+";
            overlay.style.display = 'flex';
            setTimeout(() => { if(sel.selectedIndex < 25) { sel.selectedIndex++; init(); } }, 2000);
        };

        cvs.addEventListener('mousedown', start); cvs.addEventListener('mousemove', move);
        window.addEventListener('mouseup', () => drawing = false);
        cvs.addEventListener('touchstart', e => { e.preventDefault(); start(e); });
        cvs.addEventListener('touchmove', e => { e.preventDefault(); move(e); });

        document.getElementById('resetBtn').onclick = init;
        sel.onchange = init;
        init();
    </script>
</body>
</html>
