<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>水豚君 Aa-Zz 森林教室</title>
    <style>
        :root { --main-brown: #5D4037; --bg-green: #F1F8E9; }
        body { background-color: var(--bg-green); font-family: sans-serif; text-align: center; margin: 0; padding: 20px; color: var(--main-brown); }
        
        .ui-box { margin-bottom: 15px; display: flex; justify-content: center; gap: 10px; align-items: center; }
        
        /* 練習本容器：延續你喜歡的視覺感 */
        .notebook {
            position: relative; width: 500px; height: 380px; 
            background: white; border: 12px solid #A1887F; border-radius: 40px;
            margin: 0 auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            touch-action: none; overflow: hidden;
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 10; cursor: crosshair; }

        /* 水豚君：放在右下角陪你練習 */
        .capy-img {
            position: absolute; bottom: 10px; right: 15px;
            width: 140px; z-index: 5; pointer-events: none;
        }

        button, select { 
            padding: 12px 20px; font-size: 18px; border-radius: 25px; 
            border: 2px solid #A1887F; background: white; font-weight: bold; cursor: pointer;
        }
        .btn-score { background: #FF8A65; color: white; border: none; box-shadow: 0 4px #D84315; }

        /* 評分彈窗 */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.92); z-index: 100;
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }
        #gradeText { font-size: 120px; color: #FF5722; margin: 0; font-weight: 900; }
    </style>
</head>
<body>

    <div style="font-size: 40px; margin-bottom: 5px;">🎒 🍎 🌿 🌲</div>
    <h2 style="margin-top: 0;">水豚君森林教室 Aa-Zz</h2>

    <div class="ui-box">
        <select id="letterSelect"></select>
        <button onclick="resetCanvas()">擦乾淨</button>
        <button class="btn-score" onclick="submitWork()">寫好了交卷</button>
    </div>

    <div class="notebook">
        <img class="capy-img" src="https://img.picui.cn/free/2024/07/03/668512137996c.png" alt="Capybara">
        
        <canvas id="paintCanvas" width="500" height="380"></canvas>

        <div id="overlay">
            <h1 id="gradeText">A+</h1>
            <p id="feedback" style="font-size: 20px; font-weight: bold;"></p>
        </div>
    </div>

    <script>
        let canvas, ctx, sel, overlay, gradeText, feedback;
        let isDrawing = false;
        let hasPainted = false; 

        // 確保網頁完全載入後才初始化，防止 canvas is not defined
        window.onload = function() {
            canvas = document.getElementById('paintCanvas');
            ctx = canvas.getContext('2d');
            sel = document.getElementById('letterSelect');
            overlay = document.getElementById('overlay');
            gradeText = document.getElementById('gradeText');
            feedback = document.getElementById('feedback');

            // 產生 A-Z 選單
            for(let i=65; i<=90; i++) {
                let U = String.fromCharCode(i);
                let opt = document.createElement('option');
                opt.value = U;
                opt.innerHTML = `練習字母 ${U}${U.toLowerCase()}`;
                sel.appendChild(opt);
            }

            // 繪圖監聽
            canvas.addEventListener('mousedown', startDraw);
            canvas.addEventListener('mousemove', drawing);
            window.addEventListener('mouseup', stopDraw);
            canvas.addEventListener('touchstart', startDraw);
            canvas.addEventListener('touchmove', drawing);
            canvas.addEventListener('touchend', stopDraw);

            sel.onchange = resetCanvas;
            resetCanvas();
        };

        function playSound(text) {
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'en-US';
            utter.rate = 0.7;
            window.speechSynthesis.speak(utter);
        }

        function resetCanvas() {
            overlay.style.display = 'none';
            hasPainted = false;
            ctx.clearRect(0, 0, 500, 380);
            
            // 繪製大小寫底字 Aa, Bb...
            ctx.font = 'bold 220px Arial';
            ctx.fillStyle = '#F5F5F5';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(sel.value + sel.value.toLowerCase(), 250, 190);
            
            // 只讀字母發音
            playSound(sel.value);
        }

        function submitWork() {
            overlay.style.display = 'flex';
            if (!hasPainted) {
                gradeText.innerText = "再加油";
                gradeText.style.color = "#9E9E9E";
                feedback.innerText = "你還沒開始動筆喔！";
                playSound("Please try again");
            } else {
                gradeText.innerText = "A+";
                gradeText.style.color = "#FF5722";
                feedback.innerText = "水豚君：太棒了！換下一個字母！";
                playSound("Excellent! " + sel.value);
                setTimeout(() => {
                    if (sel.selectedIndex < 25) {
                        sel.selectedIndex++;
                        resetCanvas();
                    }
                }, 2000);
            }
        }

        function getPos(e) {
            const r = canvas.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
            return {x, y};
        }
        function startDraw(e) { isDrawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); }
        function drawing(e) {
            if(!isDrawing) return;
            e.preventDefault();
            const p = getPos(e);
            ctx.lineTo(p.x, p.y);
            ctx.lineWidth = 15; ctx.lineCap = 'round'; ctx.strokeStyle = '#5D4037';
            ctx.stroke();
            hasPainted = true;
        }
        function stopDraw() { isDrawing = false; }
    </script>
</body>
</html>
