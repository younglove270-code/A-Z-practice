<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>水豚君森林練習帖</title>
    <style>
        :root {
            --capy-brown: #9E7B5C;
            --grass-green: #D4EDDA; /* 保留森林綠漸層 */
            --sky-white: #F9FDF9;
        }

        /* 🌲 保留原本深獲好評的森林綠漸層背景 */
        body { 
            background: linear-gradient(180deg, var(--sky-white) 0%, var(--grass-green) 100%);
            text-align: center; 
            font-family: "Microsoft JhengHei", sans-serif; 
            margin: 0; padding: 20px; 
            color: #5D4037;
            overflow: hidden; 
            height: 100vh;
        }

        .title { color: #5D4037; font-size: 28px; margin-bottom: 20px; text-shadow: 2px 2px white; }

        /* 畫布容器 */
        #box { 
            width: 480px; height: 360px; 
            background: white; 
            border: 8px solid #E6D5C3; 
            border-radius: 35px; 
            margin: 10px auto; 
            position: relative; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); 
            touch-action: none; 
        }

        canvas { 
            display: block; 
            border-radius: 27px; 
            background: transparent; 
            position: relative; z-index: 5;
        }

        /* 字母底字 */
        .guide-text { 
            position: absolute; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center;
            font-size: 240px; font-weight: bold; color: #F5F5F5; 
            z-index: 1; pointer-events: none;
        }

        /* 🦦 修正核心：內嵌可愛水豚貼圖，取代原本的方塊 */
        #capy-sticker {
            position: absolute;
            bottom: 10px;
            left: 15px;
            width: 130px; /* 調整大小 */
            height: 80px;
            z-index: 6; 
            pointer-events: none;
            /* 使用 Base64 內嵌一張呆萌水豚圖，確保穩定顯示 */
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMjAgODAiPjxlbGxpcHNlIGN4PSI2MCIgY3k9IjQ1IiByeD0iNTUiIHJ5PSIzNSIgZmlsbD0iI0E2N0M1RiIgc3Ryb2tlPSIjNTQzQjMxIiBzdHJva2Utd2lkdGg9IjIiLz48ZWxsaXBzZSBjeD0iMjUiIGN5PSI0MCIgcng9IjIwIiByeT0iMjAiIGZpbGw9IiNEO0E5OEMiLz48Y2lyY2xlIGN4PSIyMiIgY3k9IjM1IiByPSIyIiBmaWxsPSIjNTQzQjMxIi8+PGNpcmNsZSBjeD0iMzAiIGN5PSIzNSIgcj0iMiIgZmlsbD0iIzU0M0IzMSIvPjxwYXRoIGQ9Ik0yMiA0NSBRMjYgNTAgMzAgNDUiIGZpbGw9Im5vbmUiIHN0cm9rZT0iIzU0M0IzMSIgc3Ryb2tlLXdpZHRoPSIxLjUiLz48ZWxsaXBzZSBjeD0iODAiIGN5PSIxNSIgcng9IjgiIHJ5PSI4IiBmaWxsPSIjQTY3QzVGIiBzdHJva2U9IjU0M0IzMSIvPjxlbGxpcHNlIGN4PSI0MCIgY3k9IjE1IiByeD0iOCIgcnk9IjgiIGZpbGw9IiNBNjdDNUYiIHN0cm9rZT0iNTQzQjMxIi8+PC9zdmc+');
            background-repeat: no-repeat;
            background-size: contain;
        }

        /* UI 按鈕樣式 */
        .ui { margin-bottom: 15px; display: flex; justify-content: center; gap: 12px; }
        select, button { 
            padding: 10px 20px; font-size: 16px; 
            border-radius: 25px; border: 2px solid #E0E0E0; 
            cursor: pointer; font-family: inherit;
        }
        .score-btn { background: #FFAB91; color: white; border: none; font-weight: bold; }
        .reset-btn { background: #E6D5C3; color: #5D4037; border: none; font-weight: bold; }

        /* 評分浮層 */
        #celebration-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; background: rgba(255, 255, 255, 0.95); 
            border-radius: 27px; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 100; 
        }
        #grade { font-size: 100px; color: #FF7043; font-weight: 900; margin: 0; }
    </style>
</head>
<body>

    <h2 class="title">✨ 水豚君森林練習帖 ✨</h2>
    
    <div class="ui">
        <select id="letterSel"></select>
        <button class="reset-btn" id="resBtn">重寫</button>
        <button class="score-btn" id="scoBtn">看評分</button>
    </div>

    <div id="box">
        <div class="guide-text" id="guidTxt">Aa</div>
        
        <div id="capy-sticker"></div>

        <canvas id="c" width="480" height="360"></canvas>
        
        <div id="celebration-overlay">
            <h1 id="grade">A+</h1>
            <p style="font-size: 20px; font-weight: bold; color: #5D4037;">水豚君為你歡呼！🍊</p>
        </div>
    </div>

    <script>
        (function() {
            const cvs = document.getElementById('c'), ctx = cvs.getContext('2d');
            const letterSel = document.getElementById('letterSel'), overlay = document.getElementById('celebration-overlay');
            let alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split(""), drawing = false;

            // 初始化選單
            alphabet.forEach(l => {
                let opt = document.createElement('option'); opt.value = l; opt.innerHTML = "練習 " + l + l.toLowerCase(); letterSel.appendChild(opt);
            });

            function initCanvas() {
                ctx.clearRect(0, 0, 480, 360);
                document.getElementById('guidTxt').textContent = letterSel.value + letterSel.value.toLowerCase();
                overlay.style.display = 'none';
                
                // 畫格線
                ctx.setLineDash([5, 5]); ctx.lineWidth = 1; ctx.strokeStyle = "#DDD";
                [90, 180, 270].forEach(y => { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(480, y); ctx.stroke(); });
                ctx.setLineDash([]);
            }

            function getPos(e) {
                let r = cvs.getBoundingClientRect();
                let cx = e.clientX || (e.touches && e.touches[0].clientX);
                let cy = e.clientY || (e.touches && e.touches[0].clientY);
                return { x: cx - r.left, y: cy - r.top };
            }

            function start(e) { drawing = true; ctx.beginPath(); let p = getPos(e); ctx.moveTo(p.x, p.y); }
            function move(e) {
                if (!drawing) return; e.preventDefault();
                let p = getPos(e);
                ctx.lineWidth = 12; ctx.lineCap = 'round'; ctx.strokeStyle = '#4FC3F7';
                ctx.lineTo(p.x, p.y); ctx.stroke();
            }
            function stop() { drawing = false; }

            document.getElementById('scoBtn').onclick = () => overlay.style.display = 'flex';
            document.getElementById('resBtn').onclick = initCanvas;
            letterSel.onchange = initCanvas;

            cvs.addEventListener('mousedown', start); cvs.addEventListener('mousemove', move); window.addEventListener('mouseup', stop);
            cvs.addEventListener('touchstart', start, {passive: false}); cvs.addEventListener('touchmove', move, {passive: false}); cvs.addEventListener('touchend', stop);

            initCanvas();
        })();
    </script>
</body>
</html>
