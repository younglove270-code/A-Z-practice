<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>水豚君陪你寫英文</title>
    <style>
        :root {
            --capy: #D7A98C;
            --nose: #A67C5F;
            --line: #5D4037;
        }
        body {
            margin: 0;
            padding: 20px 10px;
            background: #FFF8F0;
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            text-align: center;
            color: var(--line);
        }
        h1 {
            font-size: 24px;
            margin: 10px 0 20px;
            color: #5D4037;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        select, button {
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 9999px;
            border: none;
            cursor: pointer;
        }
        select {
            background: white;
            border: 2px solid #E6D5C3;
        }
        .reset-btn {
            background: #E6D5C3;
            color: #5D4037;
            font-weight: bold;
        }
        .score-btn {
            background: #FF9F80;
            color: white;
            font-weight: bold;
        }
        #box {
            width: 480px;
            height: 360px;
            max-width: 95vw;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(166,124,95,0.15);
            position: relative;
            overflow: hidden;
        }
        canvas {
            display: block;
            border-radius: 30px;
        }

        /* 慶祝 / 反饋 遮罩 */
        #overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255,255,255,0.92);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            border-radius: 30px;
        }
        .capy-stickers {
            display: flex;
            gap: 25px;
            margin-bottom: 10px;
        }
        .capy-sticker { width: 110px; height: 110px; }
        #grade {
            font-size: 100px;
            font-weight: 900;
            margin: 10px 0 8px;
            line-height: 1;
        }
        #feedback {
            font-size: 22px;
            font-weight: bold;
            color: #5D4037;
        }

        @keyframes jump {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-25px) rotate(8deg); }
        }
        .happy { animation: jump 0.7s infinite alternate; }
    </style>
</head>
<body>
    <h1>🐾 水豚君陪你寫英文 🐾</h1>
    
    <div class="controls">
        <select id="sel"></select>
        <button class="reset-btn" id="resetBtn">重寫</button>
        <button class="score-btn" id="scoreBtn">看評分</button>
    </div>

    <div id="box">
        <canvas id="c" width="480" height="360"></canvas>
        
        <!-- 反饋遮罩 -->
        <div id="overlay">
            <div class="capy-stickers" id="stickers"></div>
            <div id="grade">A+</div>
            <div id="feedback">太厲害了！</div>
        </div>
    </div>

    <script>
        const cvs = document.getElementById('c');
        const ctx = cvs.getContext('2d');
        const sel = document.getElementById('sel');
        const overlay = document.getElementById('overlay');
        const gradeEl = document.getElementById('grade');
        const feedbackEl = document.getElementById('feedback');
        const stickersEl = document.getElementById('stickers');

        let drawing = false;
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

        // 產生選單
        alphabet.forEach(l => {
            const opt = document.createElement('option');
            opt.value = l;
            opt.textContent = `練習 ${l}${l.toLowerCase()}`;
            sel.appendChild(opt);
        });

        function reset() {
            overlay.style.display = 'none';
            ctx.clearRect(0, 0, 480, 360);

            // 四線格
            ctx.setLineDash([8, 8]);
            ctx.lineWidth = 1.5;
            [90, 144, 198, 252].forEach((y, i) => {
                ctx.strokeStyle = (i === 2) ? "#A3E635" : "#E6D5C3";
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(480, y);
                ctx.stroke();
            });
            ctx.setLineDash([]);

            // 底字
            ctx.font = 'bold 240px Arial';
            ctx.fillStyle = '#F0E8E0';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(sel.value + sel.value.toLowerCase(), 240, 180);
        }

        function getPos(e) {
            const r = cvs.getBoundingClientRect();
            const cx = e.clientX || (e.touches && e.touches[0].clientX);
            const cy = e.clientY || (e.touches && e.touches[0].clientY);
            return { x: cx - r.left, y: cy - r.top };
        }

        function start(e) { drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); }
        function move(e) {
            if (!drawing) return;
            const p = getPos(e);
            ctx.lineWidth = 18;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = '#4FC3F7';
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
        }
        function stop() { drawing = false; }

        // 水豚 SVG 函數
        function createCapy(happy = true) {
            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.setAttribute("viewBox", "0 0 120 120");
            svg.setAttribute("class", happy ? "capy-sticker happy" : "capy-sticker");
            svg.innerHTML = happy ? `
                <ellipse cx="60" cy="68" rx="48" ry="38" fill="#D7A98C" stroke="#5D4037" stroke-width="4"/>
                <ellipse cx="88" cy="75" rx="22" ry="26" fill="#A67C5F" stroke="#5D4037" stroke-width="4"/>
                <ellipse cx="32" cy="65" rx="18" ry="22" fill="#A67C5F" stroke="#5D4037" stroke-width="4"/>
                <rect x="40" y="48" width="18" height="4" rx="2" fill="#5D4037" transform="rotate(-20 45 50)"/>
                <text x="75" y="38" font-size="28">✨</text>
            ` : `
                <ellipse cx="60" cy="68" rx="48" ry="38" fill="#D7A98C" stroke="#5D4037" stroke-width="4"/>
                <ellipse cx="88" cy="75" rx="22" ry="26" fill="#A67C5F" stroke="#5D4037" stroke-width="4"/>
                <ellipse cx="32" cy="65" rx="18" ry="22" fill="#A67C5F" stroke="#5D4037" stroke-width="4"/>
                <rect x="40" y="48" width="18" height="4" rx="2" fill="#5D4037" transform="rotate(-35 45 50)"/>
                <text x="78" y="45" font-size="35">😢</text>
            `;
            return svg;
        }

        function showResult(rank) {
            stickersEl.innerHTML = '';
            gradeEl.textContent = rank;

            if (rank === "A+" || rank === "A") {
                // 兩個歡呼水豚
                stickersEl.appendChild(createCapy(true));
                stickersEl.appendChild(createCapy(true));
                feedbackEl.textContent = "太厲害了！水豚君為你歡呼～ 🥳";
                feedbackEl.style.color = "#FF7043";
            } 
            else if (rank === "B+" || rank === "B") {
                stickersEl.appendChild(createCapy(true));
                feedbackEl.textContent = "很棒喔！繼續加油～ 💪";
                feedbackEl.style.color = "#FFB300";
            } 
            else {
                // C+ 或更低 → 哭哭水豚
                stickersEl.appendChild(createCapy(false));
                feedbackEl.textContent = "沒關係…下次再努力喔～ 😢";
                feedbackEl.style.color = "#78909C";
            }

            overlay.style.display = 'flex';
        }

        function score() {
            const w = 480, h = 360;
            const temp = document.createElement('canvas');
            temp.width = w; temp.height = h;
            const tctx = temp.getContext('2d');

            tctx.font = 'bold 240px Arial';
            tctx.textAlign = 'center';
            tctx.textBaseline = 'middle';
            tctx.fillText(sel.value + sel.value.toLowerCase(), 240, 180);

            const std = tctx.getImageData(0,0,w,h).data;
            const cur = ctx.getImageData(0,0,w,h).data;

            let match = 0, total = 0, miss = 0;

            for (let i = 3; i < std.length; i += 4) {
                if (std[i] > 50) {
                    total++;
                    if (cur[i] > 180) match++;
                } else if (cur[i] > 180) {
                    miss++;
                }
            }

            const accuracy = total > 0 ? match / total : 0;
            let final = accuracy * 100 - miss * 1.5;
            let rank = "C+";

            if (final > 88) rank = "A+";
            else if (final > 75) rank = "A";
            else if (final > 55) rank = "B+";
            else if (final > 35) rank = "B";

            showResult(rank);

            // 2秒後自動下一題
            setTimeout(() => {
                if (sel.selectedIndex < sel.options.length - 1) {
                    sel.selectedIndex++;
                    reset();
                }
            }, 2200);
        }

        // 事件
        cvs.addEventListener('mousedown', start);
        cvs.addEventListener('mousemove', move);
        window.addEventListener('mouseup', stop);

        cvs.addEventListener('touchstart', e => { e.preventDefault(); start(e); });
        cvs.addEventListener('touchmove', e => { e.preventDefault(); move(e); });
        cvs.addEventListener('touchend', stop);

        document.getElementById('resetBtn').onclick = reset;
        document.getElementById('scoreBtn').onclick = score;
        sel.onchange = reset;

        reset(); // 啟動
    </script>
</body>
</html>
