<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>水豚君 Aa-Zz 森林教室</title>
    <style>
        :root { --main-brown: #5D4037; --bg-green: #F1F8E9; }
        body { background-color: var(--bg-green); font-family: sans-serif; text-align: center; margin: 0; padding: 20px; color: var(--main-brown); }
        
        .ui-box { margin-bottom: 15px; display: flex; justify-content: center; gap: 10px; align-items: center; flex-wrap: wrap; }
        
        /* 練習本容器 */
        .notebook {
            position: relative; width: 500px; height: 380px; 
            background: white; border: 12px solid #A1887F; border-radius: 40px;
            margin: 0 auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            touch-action: none; overflow: hidden;
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 10; cursor: crosshair; }

        /* 正宗水豚君插圖 */
        .capy-img {
            position: absolute; bottom: 10px; right: 15px;
            width: 140px; z-index: 5; pointer-events: none;
        }

        button, select { 
            padding: 12px 20px; font-size: 18px; border-radius: 25px; 
            border: 2px solid #A1887F; background: white; font-weight: bold; cursor: pointer;
        }
        .btn-score { background: #FF8A65; color: white; border: none; box-shadow: 0 4px #D84315; }
        .btn-score:active { transform: translateY(2px); box-shadow: 0 1px #D84315; }

        /* 評分與發音提示 */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.92); z-index: 100;
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }
        #gradeText { font-size: 120px; color: #FF5722; margin: 0; font-weight: 900; }
    </style>
</head>
<body>

    <h2 style="margin-top: 0;">🍃 水豚君陪你練英文 Aa-Zz 🌿</h2>

    <div class="ui-box">
        <select id="letterSelect"></select>
        <button onclick="playLetterSound()">🔊 聽發音</button>
        <button onclick="resetCanvas()">重寫</button>
        <button class="btn-score" onclick="submitWork()">交卷評分</button>
    </div>

    <div class="notebook">
        <img class="capy-img" src="https://img.picui.cn/free/2024/07/03/668512137996c.png" alt="Capybara">
        
        <canvas id="paintCanvas" width="500" height="380"></canvas>

        <div id="overlay">
            <h1 id="gradeText">A+</h1>
            <p id="feedback" style="font-size: 20px; font-weight: bold;"></p>
        </div>
    </div>

    <script>
        let canvas, ctx, sel, overlay, gradeText, feedback;
        let isDrawing = false;
        let hasPainted = false; // 用於簡單評分機制

        document.addEventListener('DOMContentLoaded', function() {
            canvas = document.getElementById('paintCanvas');
            ctx = canvas.getContext('2d');
            sel = document.getElementById('letterSelect');
            overlay = document.getElementById('overlay');
            gradeText = document.getElementById('gradeText');
            feedback = document.getElementById('feedback');

            // 1. 初始化 A-Z 大小寫選項
            for(let i=65; i<=90; i++) {
                let U = String.fromCharCode(i);
                let L = U.toLowerCase();
                let opt = document.createElement('option');
                opt.value = U;
                opt.innerHTML = `練習字母 ${U} ${L}`;
                sel.appendChild(opt);
            }

            // 2. 綁定繪圖事件 (支援滑鼠與觸控)
            const start = (e) => { isDrawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); };
            const move = (e) => { 
                if(!isDrawing) return; 
                e.preventDefault();
                const p = getPos(e);
                ctx.lineTo(p.x, p.y);
                ctx.lineWidth = 15; ctx.lineCap = 'round'; ctx.strokeStyle = '#5D4037';
                ctx.stroke();
                hasPainted = true;
            };
            const stop = () => { isDrawing = false; };

            canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move); window.addEventListener('mouseup', stop);
            canvas.addEventListener('touchstart', start); canvas.addEventListener('touchmove', move); canvas.addEventListener('touchend', stop);

            sel.onchange = resetCanvas;
            resetCanvas();
        });

        // 3. 純字母發音功能
        function playLetterSound() {
            const utter = new SpeechSynthesisUtterance(sel.value); // 只讀出字母本身
            utter.lang = 'en-US';
            utter.rate = 0.7;
            window.speechSynthesis.speak(utter);
        }

        function resetCanvas() {
            overlay.style.display = 'none';
            hasPainted = false;
            ctx.clearRect(0, 0, 500, 380);
            
            // 繪製大小寫範本底字
            ctx.font = 'bold 220px Arial';
            ctx.fillStyle = '#F5F5F5';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(sel.value + sel.value.toLowerCase(), 250, 190);
            
            // 切換字母時自動讀一次發音
            playLetterSound();
        }

        // 4. 基礎評分機制
        function submitWork() {
            overlay.style.display = 'flex';
            
            if (!hasPainted) {
                // 如果完全沒畫
                gradeText.innerText = "再加油";
                gradeText.style.color = "#9E9E9E";
                feedback.innerText = "水豚君：你還沒開始寫喔！";
                const utter = new SpeechSynthesisUtterance("Please try writing");
                window.speechSynthesis.speak(utter);
            } else {
                // 有塗畫就給 A+ (鼓勵性質)
                gradeText.innerText = "A+";
                gradeText.style.color = "#FF5722";
                feedback.innerText = "水豚君：寫得太棒了！送你一顆橘子🍊";
                const utter = new SpeechSynthesisUtterance("Excellent! " + sel.value);
                window.speechSynthesis.speak(utter);
                
                // 2秒後自動換下一個
                setTimeout(() => {
                    if (sel.selectedIndex < 25) {
                        sel.selectedIndex++;
                        resetCanvas();
                    }
                }, 2000);
            }
        }

        function getPos(e) {
            const r = canvas.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
            return {x, y};
        }
    </script>
</body>
</html>
